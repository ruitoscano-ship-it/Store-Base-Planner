<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sensei · Setup Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F5F5EC;
    --bg2:#EEEEE4;
    --bg3:#E2E2D6;
    --surface:#FFFFFF;
    --border:rgba(0,0,0,0.07);
    --border2:rgba(0,0,0,0.14);
    --text:#0A0A0A;
    --text2:#3D3D36;
    --text3:#8A8A7E;
    --yellow:#F0F078;
    --yellow-dim:#D8D860;
    --yellow-bg:#FAFAE6;
    --green:#1A6B1A;
    --green-light:#EAF7EA;
    --amber:#7A5200;
    --amber-light:#FFF8DC;
    --red:#A80000;
    --red-light:#FFF2F2;
    --sidebar-w:200px;
    --topbar-h:56px;
    --font:'DM Sans',system-ui,sans-serif;
    --mono:'DM Mono','Courier New',monospace;
    --r:10px;
    --r-lg:14px;
    --r-xl:18px;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased;line-height:1.5}

  /* ── App shell ── */
  .app{display:flex;height:100vh;overflow:hidden}

  /* ── Sidebar ── */
  .sidebar{
    width:var(--sidebar-w);min-width:var(--sidebar-w);
    background:#111110;
    display:flex;flex-direction:column;
    overflow:hidden;border-right:1px solid rgba(255,255,255,0.04);
  }
  .sidebar-header{
    padding:20px 16px 16px;
    display:flex;align-items:center;gap:10px;
    border-bottom:1px solid rgba(255,255,255,0.05);
    flex-shrink:0;
  }
  .sidebar-logo-dot{
    width:26px;height:26px;border-radius:8px;
    background:var(--yellow);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;font-size:11px;font-weight:800;
    color:#111110;letter-spacing:-0.5px;
  }
  .sidebar-logo{
    display:flex;flex-direction:column;
    font-size:13px;font-weight:700;color:#FFFFFF;letter-spacing:0.02em;
    line-height:1.2;
  }
  .sidebar-version{font-size:9px;color:rgba(255,255,255,0.25);font-weight:400;letter-spacing:0.04em;margin-top:1px}

  .sidebar-nav{padding:8px 8px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
  .nav-section{
    font-size:8px;font-weight:700;color:rgba(255,255,255,0.2);
    letter-spacing:0.14em;text-transform:uppercase;
    padding:14px 8px 4px;
  }
  .nav-section:first-child{padding-top:6px}
  .nav-item{
    display:flex;align-items:center;gap:8px;
    padding:8px 10px;cursor:pointer;
    font-size:12px;font-weight:500;letter-spacing:0.01em;
    color:rgba(255,255,255,0.38);
    border-radius:7px;transition:all 0.1s;
    user-select:none;position:relative;
  }
  .nav-item:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.65)}
  .nav-item.active{background:var(--yellow);color:#111110;font-weight:700}
  .nav-item.active svg{opacity:1}
  .nav-item svg{flex-shrink:0;opacity:0.45;transition:opacity 0.1s}
  .nav-item:hover svg{opacity:0.7}

  .sidebar-footer{
    padding:12px 16px;
    border-top:1px solid rgba(255,255,255,0.05);
    font-size:9px;color:rgba(255,255,255,0.15);
    letter-spacing:0.04em;line-height:1.8;
    flex-shrink:0;
  }

  /* ── Main area ── */
  .main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
  .topbar{
    height:var(--topbar-h);flex-shrink:0;
    background:rgba(245,245,236,0.85);backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border2);
    padding:0 28px;
    display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:30;
  }
  .topbar-left{display:flex;align-items:center;gap:10px}
  .topbar-title{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-0.01em}
  .topbar-sep{width:1px;height:16px;background:var(--border2)}
  .topbar-breadcrumb{font-size:11px;color:var(--text3);font-family:var(--mono)}
  .topbar-actions{display:flex;gap:8px;align-items:center}
  .content{padding:28px 32px;flex:1;overflow-y:auto}

  /* ── Buttons ── */
  .btn{
    padding:7px 16px;font-size:12px;font-weight:600;
    border:1px solid var(--border2);border-radius:7px;
    cursor:pointer;background:var(--surface);color:var(--text);
    font-family:var(--font);transition:all 0.1s;white-space:nowrap;
    letter-spacing:0.01em;
  }
  .btn:hover{background:var(--bg2);border-color:rgba(0,0,0,0.25)}
  .btn:active{transform:scale(0.98)}
  .btn-primary{
    background:#111110;color:var(--yellow);
    border-color:#111110;
    box-shadow:0 1px 4px rgba(0,0,0,0.2);
  }
  .btn-primary:hover{background:#222220;border-color:#222220}
  .btn-danger{background:var(--red-light);color:var(--red);border-color:rgba(168,0,0,0.15)}
  .btn-danger:hover{background:#ffe4e4}
  .btn-sm{padding:4px 10px;font-size:11px;border-radius:5px}
  .btn-ghost{border-color:transparent;background:transparent;box-shadow:none}
  .btn-ghost:hover{background:var(--bg2);border-color:var(--border)}

  /* ── Cards ── */
  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--r-xl);
    padding:24px 26px;
    margin-bottom:16px;
  }
  .card:last-child{margin-bottom:0}
  .card-yellow{border-top:3px solid var(--yellow)}

  /* ── Section headers ── */
  .sec{
    font-size:11px;font-weight:700;
    color:var(--text2);
    text-transform:uppercase;letter-spacing:0.1em;
    margin:20px 0 12px;
    display:flex;align-items:center;gap:10px;
  }
  .sec::after{content:'';flex:1;height:1px;background:var(--border)}
  .sec:first-child{margin-top:0}

  /* ── Grid layouts ── */
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

  /* ── Form elements ── */
  .field{display:flex;flex-direction:column;gap:5px}
  .field-label{
    font-size:11px;font-weight:600;color:var(--text2);
    display:flex;align-items:center;gap:5px;flex-wrap:wrap;
    letter-spacing:0.02em;
  }
  .field-wrap{position:relative;display:flex;align-items:center}
  .fi{
    width:100%;padding:9px 13px;
    border:1.5px solid var(--border2);border-radius:8px;
    font-size:13px;background:var(--surface);color:var(--text);
    font-family:var(--font);transition:border-color 0.12s,box-shadow 0.12s;
    line-height:1.4;
  }
  .fi:focus{outline:none;border-color:#0A0A0A;box-shadow:0 0 0 3px rgba(0,0,0,0.06)}
  .fi.auto-f{
    background:var(--bg);border-style:dashed;
    border-color:rgba(0,0,0,0.18);color:var(--text2);
  }
  .fi.ov-f{
    border-color:#0A0A0A;background:#FFFFF4;
    border-style:solid;
  }
  .rb{
    position:absolute;right:8px;top:50%;transform:translateY(-50%);
    background:var(--yellow);border:none;border-radius:5px;
    width:22px;height:22px;cursor:pointer;font-size:11px;
    color:#111110;font-weight:800;
    display:flex;align-items:center;justify-content:center;
    transition:all 0.1s;
  }
  .rb:hover{background:var(--yellow-dim);transform:translateY(-50%) scale(1.05)}
  .fhint{font-size:10px;color:var(--text3);line-height:1.45;font-family:var(--mono)}
  .fhint.ov{color:var(--amber)}

  /* ── Badges ── */
  .ba{display:inline-flex;align-items:center;padding:2px 7px;border-radius:100px;font-size:9px;font-weight:700;background:var(--bg2);color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;font-family:var(--mono)}
  .bov{display:inline-flex;align-items:center;padding:2px 7px;border-radius:100px;font-size:9px;font-weight:700;background:var(--yellow);color:#111110;text-transform:uppercase;letter-spacing:0.06em;font-family:var(--mono)}

  /* ── Tables ── */
  .tbl-wrap{overflow-x:auto;border-radius:var(--r-lg);border:1px solid var(--border2)}
  .tbl{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
  .tbl th{
    text-align:left;padding:9px 14px;
    font-size:9px;font-weight:700;color:var(--text3);
    text-transform:uppercase;letter-spacing:0.09em;
    border-bottom:1px solid var(--border2);
    background:var(--bg);font-family:var(--mono);
  }
  .tbl td{
    padding:11px 14px;border-bottom:1px solid rgba(0,0,0,0.04);
    color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .tbl tr:last-child td{border-bottom:none}
  .tbl tbody tr:hover td{background:rgba(240,240,120,0.08)}
  .tbl .grp-row td{
    font-weight:700;background:var(--bg)!important;color:var(--text2);
    font-size:9px;text-transform:uppercase;letter-spacing:0.1em;
    padding:6px 14px;font-family:var(--mono);
    border-left:3px solid var(--yellow);
  }
  .tbl .tot-row td{
    font-weight:700;border-top:2px solid var(--border2);
    font-size:14px;background:var(--bg)!important;
    font-family:var(--mono);
  }

  /* ── Inline editable inputs ── */
  .ie{
    border:none;border-bottom:1.5px dashed rgba(0,0,0,0.15);
    background:transparent;font-size:13px;color:var(--text);
    padding:2px 4px;width:80px;font-family:var(--mono);
    transition:border-color 0.1s;
  }
  .ie:focus{outline:none;border-bottom:1.5px solid var(--text)}

  /* ── Tabs ── */
  .tab-bar{
    display:flex;gap:0;
    border-bottom:1.5px solid var(--border2);
    margin-bottom:20px;flex-wrap:wrap;
  }
  .tab{
    padding:8px 16px;font-size:10px;cursor:pointer;
    color:var(--text3);border-bottom:2px solid transparent;
    margin-bottom:-1.5px;font-weight:700;transition:all 0.1s;
    white-space:nowrap;text-transform:uppercase;letter-spacing:0.08em;
    font-family:var(--mono);
  }
  .tab:hover{color:var(--text2)}
  .tab.on{color:var(--text);border-bottom-color:var(--yellow)}

  /* ── Info box ── */
  .ibox{
    padding:10px 14px;border-radius:8px;
    font-size:11px;line-height:1.6;margin-bottom:14px;
    background:var(--yellow-bg);color:#4A4A00;
    border:1px solid rgba(200,200,0,0.2);
  }

  /* ── Format buttons ── */
  .fmt-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
  .fmt-btn{
    padding:7px 18px;border-radius:8px;
    font-size:11px;font-weight:700;
    border:1.5px solid var(--border2);cursor:pointer;
    background:var(--surface);color:var(--text2);
    transition:all 0.1s;text-transform:uppercase;letter-spacing:0.07em;
    font-family:var(--mono);
  }
  .fmt-btn:hover{border-color:var(--text);color:var(--text)}
  .fmt-btn.active{background:#111110;color:var(--yellow);border-color:#111110}

  /* ── Metric card ── */
  .mc{
    background:var(--bg);border-radius:var(--r-lg);
    padding:14px 16px;border:1px solid var(--border);
  }
  .mc-l{
    font-size:9px;font-weight:700;color:var(--text3);
    text-transform:uppercase;letter-spacing:0.1em;
    margin-bottom:4px;font-family:var(--mono);
  }
  .mc-v{
    font-size:22px;font-weight:700;color:var(--text);
    font-family:var(--mono);font-feature-settings:'tnum';
    line-height:1;letter-spacing:-0.5px;
  }

  /* ── Dashboard metric cards (metric-card/metric-label/metric-value) ── */
  .metric-card{
    background:var(--bg);border-radius:var(--r-lg);
    padding:16px 18px;border:1px solid var(--border);
    min-width:0;overflow:hidden;display:flex;flex-direction:column;
  }
  .metric-label{
    font-size:10px;font-weight:700;color:var(--text3);
    text-transform:uppercase;letter-spacing:0.1em;
    margin-bottom:6px;font-family:var(--mono);
  }
  /* metric sub stays on one line */
  .metric-sub{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .metric-value{
    font-size:20px;font-weight:700;color:var(--text);
    font-family:var(--mono);font-feature-settings:'tnum';
    line-height:1.1;letter-spacing:-0.5px;
  }
  /* metric sub stays on one line */
  .metric-sub{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .metric-sub{
    font-size:11px;color:var(--text3);margin-top:4px;
    font-family:var(--mono);
  }

  /* ── Project list rows ── */
  .prow{
    display:flex;align-items:center;gap:14px;
    padding:14px 0;border-bottom:1px solid var(--border);
    cursor:pointer;transition:padding 0.1s,background 0.1s;
  }
  .prow:hover{
    padding:14px 12px;margin:0 -12px;
    border-radius:9px;background:var(--bg);border-color:transparent;
  }
  .prow:last-child{border-bottom:none}

  /* ── Pie bar ── */
  .pie-bar{height:3px;border-radius:2px;background:var(--bg3);margin:2px 0 4px}
  .pie-bar-fill{height:100%;border-radius:2px}

  /* ── Separator ── */
  .sep{height:1px;background:var(--border);margin:16px 0}

  /* ── Collapsible section cards ── */
  .coll-card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--r-xl);margin-bottom:12px;overflow:hidden;
  }
  .coll-hdr{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 20px;cursor:pointer;user-select:none;
    transition:background 0.1s;gap:12px;
  }
  .coll-hdr:hover{background:rgba(0,0,0,0.02)}
  .coll-hdr-l{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
  .coll-ico{
    width:30px;height:30px;border-radius:8px;background:var(--bg2);
    display:flex;align-items:center;justify-content:center;
    font-size:13px;flex-shrink:0;
  }
  .coll-info{flex:1;min-width:0}
  .coll-ttl{font-size:13px;font-weight:700;color:var(--text);line-height:1.3}
  .coll-sub{
    font-size:10px;color:var(--text3);font-family:var(--mono);
    margin-top:2px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;
  }
  .chip{
    padding:1px 7px;border-radius:100px;
    font-size:9px;font-weight:700;font-family:var(--mono);
    background:var(--bg2);color:var(--text3);
    white-space:nowrap;
  }
  .chip-y{background:var(--yellow);color:#111}
  .chip-g{background:var(--green-light);color:var(--green)}
  .coll-arr{
    font-size:10px;color:var(--text3);flex-shrink:0;
    transition:transform 0.15s;
  }
  .coll-arr.open{transform:rotate(180deg)}
  .coll-body{padding:16px 20px 20px;border-top:1px solid var(--border)}

  /* ── Empty state ── */
  .empty{text-align:center;padding:56px 24px;color:var(--text3)}

  /* ── Metric grid ── */
  .metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:22px}

  /* ── Scrollbar ── */
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}
  ::-webkit-scrollbar-thumb:hover{background:var(--text3)}

  /* ── Transitions ── */
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .content > *{animation:fadeUp 0.15s ease both}

  /* ── Mobile ≤ 640px ── */
  @media(max-width:640px){
    :root{--sidebar-w:0px}
    .sidebar{display:none}
    .content{padding:14px 16px}
    .topbar{padding:0 16px;height:48px}
    .topbar-sep,.topbar-breadcrumb{display:none}
    .metric-grid{grid-template-columns:1fr 1fr;gap:10px}
    .mc-v{font-size:18px}
    .g2,.g3{grid-template-columns:1fr}
    .card{padding:16px 16px;border-radius:12px;margin-bottom:10px}
    .tab-bar{overflow-x:auto;flex-wrap:nowrap;scrollbar-width:none}
    .tab-bar::-webkit-scrollbar{display:none}
    #mobile-nav{
      position:fixed;bottom:0;left:0;right:0;height:58px;z-index:200;
      background:#111110;border-top:1px solid rgba(255,255,255,0.07);
      display:flex!important;align-items:stretch;
    }
    .app::after{content:'';height:58px;flex-shrink:0}
  }

  /* ── Tablet 641-920px ── */
  @media(min-width:641px) and (max-width:920px){
    :root{--sidebar-w:52px}
    .sidebar-header,.sidebar-footer{display:none}
    .nav-item span,.nav-section{display:none}
    .nav-item{justify-content:center;padding:12px;border-radius:0}
    .content{padding:18px 20px}
    .topbar{padding:0 20px}
    .g3{grid-template-columns:1fr 1fr}
    .tab-bar{overflow-x:auto;white-space:nowrap;flex-wrap:nowrap}
  }

  /* Mobile nav items */
  #mobile-nav .mnav-item{
    flex:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:2px;
    cursor:pointer;color:rgba(255,255,255,0.3);
    font-size:8px;font-weight:700;text-transform:uppercase;
    letter-spacing:0.06em;font-family:var(--mono);
    transition:color 0.12s;border:none;background:none;padding:0;
  }
  #mobile-nav .mnav-item svg{opacity:0.4}
  #mobile-nav .mnav-item.active{color:var(--yellow)}
  #mobile-nav .mnav-item.active svg{opacity:1}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo-dot">S</div>
      <div class="sidebar-logo">
        Sensei
        <div class="sidebar-version">Setup Calculator · v3</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Workspace</div>
      <div class="nav-item active" id="n-dash" onclick="go('dash')">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" preserveAspectRatio="xMidYMid meet"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
        <span>Dashboard</span>
      </div>
      <div class="nav-item" id="n-projs" onclick="go('projs')">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" preserveAspectRatio="xMidYMid meet"><path d="M2 4h12M2 8h8M2 12h10"/></svg>
        <span>Projetos</span>
      </div>
      <div class="nav-item" id="n-new" onclick="go('new')">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" preserveAspectRatio="xMidYMid meet"><circle cx="8" cy="8" r="6.5"/><path d="M8 5v6M5 8h6"/></svg>
        <span>Novo Setup</span>
      </div>
      <div class="nav-section">Análise</div>
      <div class="nav-item" id="n-comp" onclick="go('comp')">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" preserveAspectRatio="xMidYMid meet"><rect x="1" y="3" width="6" height="10" rx="1.2"/><rect x="9" y="3" width="6" height="10" rx="1.2"/></svg>
        <span>Comparar</span>
      </div>
      <div class="nav-item" id="n-sched" onclick="go('sched')">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" preserveAspectRatio="xMidYMid meet"><rect x="1" y="3" width="14" height="11" rx="1.5"/><path d="M1 7h14M5 1v4M11 1v4"/></svg>
        <span>Cronograma</span>
      </div>
      <div class="nav-item" id="n-sim" onclick="go('sim')">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" preserveAspectRatio="xMidYMid meet"><path d="M2 12l4-4 3 3 5-7"/><circle cx="14" cy="5" r="1.5" fill="currentColor" stroke="none"/></svg>
        <span>Simulador</span>
      </div>
      <div class="nav-section">Sistema</div>
      <div class="nav-item" id="n-stock" onclick="go('stock')">

  if(bomKey==='CAM-36-SM')   return 'CAM-36-SM';
  if(bomKey==='CAM-36-STV')  return 'CAM-36-STV';
  if(bomKey==='BRIDGE')      return 'BRIDGE';
  if(bomKey==='BRIDGE_AD')   return null; // adapter, no assembly
  // Scales: AB vs WB by key prefix
  if(bomKey.includes('-AB-')) return 'SCALE-AB';
  if(bomKey.includes('-WB-')) return 'SCALE-WB';
  // Data rails by size in label key
  const drMap={'SDR01A0100.700.G2.M':'DR-700','SDR02A0100.900.G2.M':'DR-900',
    'SDR03A0100.1100.B3.G':'DR-1100','SDR04A0100.1300.B3.G':'DR-1300',
    'SDR05A0100.1500.G2.M':'DR-1500','SDR06A0100.1700.B3.G':'DR-1700',
    'SDR07A0100.1900.G2.M':'DR-1900'};
  const drKey=Object.keys(drMap).find(k=>bomKey.includes(k)||bomKey===('DR_'+k));
  if(drKey) return drMap[drKey];
  return null; // direct component, no assembly
}

// ── Compute stock needs for a BOM ─────────────────────────────────────────
function computeStockNeeds(bom) {
  const needs = []; // {key, label, needed, assembled_stock, can_assemble, to_order_assembled, components:[{id,label,needed,stock,toOrder}], action}
  const compUsage = {}; // track total component consumption across all items

  // Flatten all BOM items across groups (excl. Instalação)
  const allItems = Object.entries(bom.groups)
    .filter(([g])=>g!=='Instalação')
    .flatMap(([,items])=>Object.entries(items));

  for(const [key, item] of allItems) {
    if(!item.qty || item.qty<=0) continue;
    const needed = item.qty;
    const asmKey = getAssemblyKey(key);
    const bom_def = asmKey ? ASSEMBLY_BOMS[asmKey] : null;

    if(bom_def) {
      // Assembled product
      const assembledStock = STOCK.assembled[asmKey]||0;
      const fromAssembled = Math.min(assembledStock, needed);
      const stillNeeded = needed - fromAssembled;

      // Can we assemble from components?
      let canAssemble = 0;
      if(stillNeeded > 0) {
        canAssemble = stillNeeded; // assume we can unless component check fails
        for(const comp of bom_def.components) {
          const availComp = (STOCK.components[comp.id]||0);
          // How many units can we assemble with this component?
          const maxFromComp = Math.floor(availComp / comp.qty);
          canAssemble = Math.min(canAssemble, maxFromComp);
        }
      }

      const toOrder = Math.max(0, stillNeeded - canAssemble);

      // Component breakdown
      const comps = bom_def.components.map(comp=>{
        const totalCompNeeded = comp.qty * needed;
        const usedForAssembled = comp.qty * fromAssembled; // already assembled
        const compNeeded = comp.qty * stillNeeded;
        const compStock = STOCK.components[comp.id]||0;
        const compToOrder = Math.max(0, compNeeded - compStock);
        return {id:comp.id, label:comp.label, qty_per:comp.qty,
          needed:compNeeded, stock:compStock, toOrder:compToOrder};
      });

      // Determine action
      let action, actionColor;
      if(fromAssembled >= needed) { action='stock'; actionColor='var(--green)'; }
      else if(toOrder===0)        { action='assemble'; actionColor='#D97706'; }
      else                        { action='order'; actionColor='var(--red)'; }

      needs.push({key, label:item.label, needed, assembledStock, fromAssembled,
        canAssemble, toOrder, action, actionColor, asmKey, components:comps, isAssembly:true});
    } else {
      // Direct component — check component stock or assembled stock (same key)
      const directStock = (STOCK.components[key]||0) + (STOCK.assembled[key]||0);
      const toOrder = Math.max(0, needed - directStock);
      let action, actionColor;
      if(toOrder===0) { action='stock'; actionColor='var(--green)'; }
      else            { action='order'; actionColor='var(--red)'; }
      needs.push({key, label:item.label, needed, assembledStock:directStock,
        fromAssembled:Math.min(directStock,needed), canAssemble:0, toOrder,
        action, actionColor, asmKey:null, components:[], isAssembly:false});
    }
  }
  return needs;
}

// ── Calc helpers ──────────────────────────────────────────────────────────
function autoCalc(base){
  const{format:fmt,area,modules,doors}=base;
  const isPT = base.projectType==='tracking'; // Only People Tracking mode
  const cam21  =base._cam21Override!==undefined?base._cam21Override:Math.ceil(area*A.cameras['CAM-21-TPT'].ratios[fmt]);
  const cam28pt=base._cam28ptOverride!==undefined?base._cam28ptOverride:Math.ceil(area*A.cameras['CAM-28-PT'].ratios[fmt]);
  const cam28door=Math.ceil(doors);
  const cam36sm = isPT ? 0 : Math.ceil(modules*(1+A.camerasSpare));
  const cam36stv= isPT ? 0 : Math.ceil(modules*(1+A.camerasSpare));
  const totalScales = isPT ? 0 : Math.ceil(area*A.scalesPerM2[fmt]*(1+A.scalesSpare));
  // ── Server calculation — fórmula exacta do Excel (Servers + Server Calculation) ──
  const useRefurb=base.useRefurbished===true;
  // useSmall based on store area — simpler and more intuitive than camera count
  const useSmall=area<=A.servers.smallThreshold;
  // If a specific model ID is passed (manual override), use it directly
  const model=(base._srvModelId
    ? (A.servers.models.find(m=>m.id===base._srvModelId) || null)
    : null)
    || (useSmall
      ? (useRefurb
          ? A.servers.models.find(m=>m.isSmall&&m.condition==='refurbished'&&m.activeRefurb)
          : A.servers.models.find(m=>m.isSmall&&m.condition==='new'&&m.activeNew))
      : (useRefurb
          ? A.servers.models.find(m=>!m.isSmall&&m.condition==='refurbished'&&m.activeRefurb)
          : A.servers.models.find(m=>!m.isSmall&&m.condition==='new'&&m.activeNew)))
    || A.servers.models.find(m=>m.activeNew||m.activeRefurb)
    || A.servers.models[A.servers.models.length-1];
  // Use the selected model's ratios (not the global A.servers.ratios which may lag behind)
  const r=model.ratios||A.servers.ratios, buf=A.servers.buffer, pctSpares=A.servers.spares;
  // Camera type mapping (fonte: Server Calculation tb_Cameras):
  // Tracking = cam21 + cam28pt + cam28door  (cam36stv NOT included)
  // Shelf Monitor = cam36sm ONLY            (cam36stv NOT included)
  // In-Hand = store_capacity × shelf_interactions (approximated from modules/area)
  const camTracking=cam21+cam28pt+cam28door;
  const camShelf=isPT ? 0 : cam36sm;  // zero in PT mode — no shelf cameras
  const storeCapPM2 = A.formatDefaults[fmt]?.storeCapPM2 || 0.3;
  const inhand = isPT ? 0 : Math.round(area * storeCapPM2 * 0.1); // zero in PT mode — no in-hand detection

  // ── Area validation ───────────────────────────────────────────────────────
  if(area > 2000) return {_areaError:true, numSrv:0, srvModel:model.id, cam21,cam28pt,cam28door,cam36sm,cam36stv,
    totalCams:cam21+cam28pt+cam28door+cam36sm+cam36stv, totalScales,
    _frac_gpu:0,_frac_cpu:0,_sc_gpu:0,_sc_cpu:0,_sc_gpu_t:0,_sc_gpu_si:0,
    _sc_cpu_t:0,_sc_cpu_s:0,_sc_cpu_i:0,_bottleneck:'GPU',_useSmall:useSmall,_nSrvRaw:0};

  // ── Area tier for constants ───────────────────────────────────────────────
  // T1: ≤50m²   T2: 50<area≤500m²   T3: 500<area≤2000m²
  const tier = area<=50 ? 1 : area<=500 ? 2 : 3;

  // ── Tier constants — read from model ratios (editable in Pressupostos) ────
  // In People Tracking mode, ALL shelf/inhand/shelfIntel constants are zero
  const vramShelf      = (useSmall||isPT) ? 0 : (r[`vramShelfT${tier}`]       ?? [0,5,15,30][tier]);
  const vramInhand     = (useSmall||isPT) ? 0 : (r[`vramInhandT${tier}`]      ?? [0,2,12,24][tier]);
  const vramShelfIntel = (useSmall||isPT) ? 0 : (r[`vramShelfIntelT${tier}`]  ?? [0,0,8,8][tier]);
  const vramPerGPU = model.vramPerGPU || 16;
  const cpuShelfConst      = (useSmall||isPT) ? 0 : (r[`cpuShelfConstT${tier}`]      ?? [0,1.7,10.2,20.4][tier]);
  const cpuInhandConst     = (useSmall||isPT) ? 0 : (r[`cpuInhandConstT${tier}`]     ?? [0,3.4,10.2,20.4][tier]);
  const cpuShelfIntelConst = (useSmall||isPT) ? 0 : (r[`cpuShelfIntelConstT${tier}`] ?? [0,10,4,4][tier]);
  const ramShelfConst      = (useSmall||isPT) ? 0 : (r[`ramShelfConstT${tier}`]      ?? [0,1.5,9,18][tier]);
  const ramInhandConst     = (useSmall||isPT) ? 0 : (r[`ramInhandConstT${tier}`]     ?? [0,3,9,18][tier]);
  const ramShelfIntelConst = (useSmall||isPT) ? 0 : (r[`ramShelfIntelConstT${tier}`] ?? [0,3,5,5][tier]);

  // ── Step 1: GPU slots ─────────────────────────────────────────────────────
  // Tracking: variable · Shelf+InHand+ShelfIntel: shared VRAM pool
  const sc_gpu_t  = Math.ceil((camTracking/(base._gpuTrackingOverride||r.gpuTracking)) / (1-buf));
  const _vramShared = vramShelf + vramInhand + vramShelfIntel;
  const sc_gpu_si = useSmall ? 0 : Math.ceil(_vramShared / vramPerGPU);
  const sc_gpu_si_raw = useSmall ? 0 : _vramShared / vramPerGPU;
  const sc_gpu_total = sc_gpu_t + sc_gpu_si;

  // ── Step 1: CPU slots ─────────────────────────────────────────────────────
  const sc_cpu_t  = Math.ceil((camTracking/r.cpuTracking) / (1-buf));
  const sc_cpu_s  = Math.ceil(camShelf/r.cpuShelf + cpuShelfConst);
  const sc_cpu_i  = Math.ceil(inhand/r.cpuInhand + cpuInhandConst);
  const sc_cpu_si = useSmall ? 0 : cpuShelfIntelConst; // constant only, partilhável
  const sc_cpu_total = sc_cpu_t + sc_cpu_s + sc_cpu_i + sc_cpu_si;

  // ── Step 1: RAM slots ─────────────────────────────────────────────────────
  const ramTracking = r.ramTracking || 2.33;
  const ramShelf    = r.ramShelf    || 1.5;
  const ramInhand   = r.ramInhand   || 1.5;
  const sc_ram_t  = useSmall ? Math.ceil(camTracking/ramTracking) : Math.ceil(camTracking/ramTracking);
  const sc_ram_s  = useSmall ? 0 : Math.ceil(camShelf/ramShelf + ramShelfConst);
  const sc_ram_i  = useSmall ? 0 : ramInhandConst;
  const sc_ram_si = useSmall ? 0 : ramShelfIntelConst;
  const sc_ram_total = sc_ram_t + sc_ram_s + sc_ram_i + sc_ram_si;

  // Step 2: Fractional servers
  const gpuFactor = base._gpuFactor||1;
  const cpuFactor = base._cpuFactor||1;
  const sc_gpu_total_adj = gpuFactor>1 ? Math.floor(sc_gpu_total/gpuFactor) : sc_gpu_total;
  const sc_cpu_total_adj = cpuFactor>1 ? Math.floor(sc_cpu_total/cpuFactor) : sc_cpu_total;
  const frac_gpu = sc_gpu_total_adj / model.gpus;
  const frac_cpu = sc_cpu_total_adj / model.cpuThreads;
  const frac_ram = sc_ram_total / (model.ramGB || 128);

  // Step 3: nSrv = ceil(max(frac_gpu, frac_cpu, frac_ram))
  const fracMax = Math.max(frac_gpu, frac_cpu, frac_ram);
  const bottleneck = frac_ram>=frac_gpu&&frac_ram>=frac_cpu?'RAM':frac_cpu>=frac_gpu?'CPU':'GPU';
  let nSrv = Math.ceil(fracMax);
  nSrv = Math.max(1, nSrv);

  // Step 4: Clustering rule — 2 active servers → 3 (quorum requires odd number)
  // Only applies to NORMAL servers. Small servers in tiny stores don't run HA clustering.
  const nSrvBeforeClustering = nSrv;
  if(nSrv===2 && !useSmall) nSrv=3;

  // Step 5: Spare servers (added on top of active count, default=false)
  const nSpares = base.addSpare===true ? Math.ceil(nSrv * pctSpares) : 0;
  const nTotal = nSrv + nSpares;

  return{cam21,cam28pt,cam28door,cam36sm,cam36stv,totalCams:cam21+cam28pt+cam28door+cam36sm+cam36stv,totalScales,numSrv:nTotal,srvModel:model.id,
    _nSrvRaw:nSrvBeforeClustering,
    _frac_gpu:frac_gpu,_frac_cpu:frac_cpu,_frac_ram:frac_ram,
    _sc_gpu:sc_gpu_total_adj,_sc_cpu:sc_cpu_total_adj,_sc_ram:sc_ram_total,
    _sc_gpu_t:sc_gpu_t,_sc_gpu_si:sc_gpu_si,_sc_gpu_si_raw:sc_gpu_si_raw,
    _sc_gpu_t_raw:camTracking/(base._gpuTrackingOverride||r.gpuTracking)/(1-buf),
    _sc_cpu_t:sc_cpu_t,_sc_cpu_s:sc_cpu_s,_sc_cpu_i:sc_cpu_i,_sc_cpu_si:sc_cpu_si,
    _sc_ram_t:sc_ram_t,_sc_ram_s:sc_ram_s,_sc_ram_i:sc_ram_i,_sc_ram_si:sc_ram_si,
    _vramShared:_vramShared,_vramShelf:vramShelf,_vramInhand:vramInhand,_vramShelfIntel:vramShelfIntel,
    _cpuShelfIntelConst:cpuShelfIntelConst,
    _bottleneck:bottleneck,_useSmall:useSmall,_isPT:isPT,_inhand:inhand};
}

function calcBOM(eff){
  const{format:fmt,area,modules,pctRef,country,cam21,cam28pt,cam28door,cam36sm,cam36stv,totalCams,totalScales,numSrv,srvModel,_nSrvRaw,scaleMixOv={},scaleDiscount=0,projectType}=eff;
  const isPT = projectType==='tracking';
  const groups={};
  // câmaras — em PT mode apenas tracking cameras (cam21, cam28pt, cam28door)
  const camBOM={
    'CAM-21-TPT':{label:'2.1mm Top Person Tracking',qty:cam21,price:A.cameras['CAM-21-TPT'].price,total:cam21*A.cameras['CAM-21-TPT'].price},
    'CAM-28-PT': {label:'2.8mm Person Tracking',qty:cam28pt,price:A.cameras['CAM-28-PT'].price,total:cam28pt*A.cameras['CAM-28-PT'].price},
    'CAM-28-DOOR':{label:'2.8mm Door Camera',qty:cam28door,price:A.cameras['CAM-28-DOOR'].price,total:cam28door*A.cameras['CAM-28-DOOR'].price},
  };
  if(!isPT){
    camBOM['CAM-36-SM'] ={label:'3.6mm Shelf Monitoring',qty:cam36sm,price:A.cameras['CAM-36-SM'].price,total:cam36sm*A.cameras['CAM-36-SM'].price};
    camBOM['CAM-36-STV']={label:'3.6mm Shelf Top View',qty:cam36stv,price:A.cameras['CAM-36-STV'].price,total:cam36stv*A.cameras['CAM-36-STV'].price};
  }
  // Remove zero-qty entries
  Object.keys(camBOM).forEach(k=>{if(!camBOM[k].qty)delete camBOM[k];});
  groups['Câmaras']=camBOM;
  // scales — only for Full Autonomous Store
  if(!isPT){
    const baseMix=A.scaleMix[fmt]||A.scaleMix['Supermercado'];
    const allScaleRefs=Object.keys(A.scaleLabels);
    const ambRefs=allScaleRefs.filter(r=>r.includes('-AB-'));
    const frioRefs=allScaleRefs.filter(r=>r.includes('-WB-'));
    const effectivePctRef=Math.max(0,Math.min(1,
      (pctRef!==undefined&&pctRef!==null)?+pctRef:(A.formatDefaults[fmt]?.pctRef||0.3)
    ));
    const ambSum=ambRefs.reduce((a,r)=>a+(baseMix[r]||0),0);
    const frioSum=frioRefs.reduce((a,r)=>a+(baseMix[r]||0),0);
    const scalesFrio=Math.round(totalScales*effectivePctRef);
    const scalesAmb=totalScales-scalesFrio;
    const sG={};
    if(ambSum>0&&scalesAmb>0){
      for(const ref of ambRefs){
        const weight=(baseMix[ref]||0)/ambSum;
        if(weight<=0&&scaleMixOv[ref]===undefined)continue;
        const qty=scaleMixOv[ref]!==undefined?+scaleMixOv[ref]:Math.round(scalesAmb*weight);
        if(qty<=0)continue;
        sG[ref]={label:A.scaleLabels[ref]||ref,qty,price:A.scalePrices[ref]||0,total:qty*(A.scalePrices[ref]||0)};
      }
    }
    if(frioSum>0&&scalesFrio>0){
      for(const ref of frioRefs){
        const weight=(baseMix[ref]||0)/frioSum;
        if(weight<=0&&scaleMixOv[ref]===undefined)continue;
        const qty=scaleMixOv[ref]!==undefined?+scaleMixOv[ref]:Math.round(scalesFrio*weight);
        if(qty<=0)continue;
        sG[ref]={label:A.scaleLabels[ref]||ref,qty,price:A.scalePrices[ref]||0,total:qty*(A.scalePrices[ref]||0)};
      }
    }
    groups['Scales']=sG;
    if((scaleDiscount||0)>0){
      Object.values(groups['Scales']).forEach(item=>{
        item.total=Math.round(item.total*(1-scaleDiscount/100));
      });
    }
  }
  // servidores
  const srvMdl=A.servers.models.find(m=>m.id===srvModel)||A.servers.models[0];
  groups['Servidores']={[srvModel]:{label:srvMdl.label+' × '+numSrv,qty:numSrv,price:srvMdl.price,total:numSrv*srvMdl.price}};
  // ── Networking — bridges only for full autonomous store ─────────────────
  const bridges=isPT ? 0 : Math.ceil(modules*0.73*(1+A.scalesSpare));
  const net=A.networking;
  const pr=net.prices;
  const pcp=net.patchCordPrices;
  const gm=net.growthMargin;
  const uplink=eff.uplink||'Wired Only';
  const isUSA=(country==='USA');

  // ── Aruba 6000 PoE switch models ────────────────────────────────────────
  const sw24=net.switches.find(s=>s.ports===24)||{id:'ARUBA6000-24P',label:'Aruba 6000 PoE 24p',ports:24,price:864};
  const sw48=net.switches.find(s=>s.ports===48)||{id:'ARUBA6000-48P',label:'Aruba 6000 PoE 48p',ports:48,price:1179};

  // ── Camera switches: only tracking cams need direct PoE switch ports ──────
  // Shelf cams (cam36sm, cam36stv) connect via bridges — not counted here
  const trackingCams = cam21 + cam28pt + cam28door;
  const camPorts=46; // 48p switch: 46 usable (2 reserved for uplink)
  const camSwQ=Math.ceil(trackingCams/camPorts);

  // ── Core switch: ports = camSwitches + 1 (router) + bridges + srvPorts ──
  // 1 server: 2 ports per server; 3+ servers: 1 port per server
  // In PT mode: bridges=0, so corePortsNeeded = camSwQ + 1 + srvPorts
  const srvPortsCore = numSrv===1 ? 2 : numSrv;
  const corePortsNeeded = camSwQ + 1 + bridges + srvPortsCore;
  const coreLabel = isPT ? 'core' : 'bridges';

  // Select core switches: fill with 48p then 24p as needed
  let coreRem=corePortsNeeded;
  const coreSw48Q=Math.floor(coreRem/48); coreRem-=coreSw48Q*48;
  const coreSw24Q=coreRem>0?Math.ceil(coreRem/24):0;
  const totalCoreSw=coreSw48Q+coreSw24Q;

  // ── SFP+ switch for server interconnect (3+ servers only) ───────────────
  let sfpSwModel=null, sfpSwQ=0;
  // SFP only when genuinely 3+ servers by load (not because of 2→3 clustering rule)
  if((_nSrvRaw||numSrv)>=3){
    const sfpPortsNeeded=numSrv+1;
    const sfpSizes=[12,24];
    const sfpSize=sfpSizes.find(s=>s>=sfpPortsNeeded)||48;
    sfpSwModel=net.sfpSwitches.find(s=>s.ports===sfpSize)||{id:'SFP-SW-'+sfpSize,label:'Switch SFP+ '+sfpSize+'p',ports:sfpSize,price:0};
    sfpSwQ=1;
  }

  // ── Build networking BOM ─────────────────────────────────────────────────
  const netItems={};

  // Camera switches (Aruba 6000 PoE 48p)
  if(camSwQ>0) netItems[sw48.id+'_cam']={label:sw48.label+' (câmaras)',qty:camSwQ,price:sw48.price,total:camSwQ*sw48.price};

  // Core switches
  if(coreSw48Q>0) netItems[sw48.id+'_core48']={label:sw48.label+' ('+coreLabel+')',qty:coreSw48Q,price:sw48.price,total:coreSw48Q*sw48.price};
  if(coreSw24Q>0) netItems[sw24.id+'_core24']={label:sw24.label+' ('+coreLabel+')',qty:coreSw24Q,price:sw24.price,total:coreSw24Q*sw24.price};

  // SFP+ switch (3+ servers)
  if(sfpSwModel&&sfpSwQ>0) netItems[sfpSwModel.id]={label:sfpSwModel.label+' (interligação servidores)',qty:sfpSwQ,price:sfpSwModel.price,total:sfpSwQ*sfpSwModel.price};

  // ── Gateways ──────────────────────────────────────────────────────────────
  if(uplink==='Wired Only'||uplink==='Wired + 5G')
    netItems.RUTX08={label:'Teltonika RUTX08',qty:1,price:pr.RUTX08,total:pr.RUTX08};
  if(uplink==='Wired + 5G')
    netItems.RUT241={label:'Teltonika RUT241 (5G backup)',qty:1,price:pr.RUT241,total:pr.RUT241};
  if(uplink==='5G Only')
    isUSA ? netItems.RUTM50={label:'Teltonika RUTM50 5G (USA)',qty:1,price:pr.RUTM50,total:pr.RUTM50}
           : netItems.RUTX50={label:'Teltonika RUTX50 5G',qty:1,price:pr.RUTX50,total:pr.RUTX50};
  (net.gatewayModels||[]).forEach(gw=>{if(pr[gw.id]>0)netItems[gw.id]={label:gw.label,qty:1,price:pr[gw.id],total:pr[gw.id]};});

  // ── Patch panels & cords ──────────────────────────────────────────────────
  const totalSw=camSwQ+totalCoreSw;
  const pp48Q=Math.ceil(totalSw/2);
  if(pp48Q>0) netItems.PP48={label:'Patch Panel 48G Cat5e',qty:pp48Q,price:net.patchPrice,total:pp48Q*net.patchPrice};
  const c050Q=Math.ceil(trackingCams*1.1);
  const c300Q=Math.ceil(bridges+numSrv*2+eff.doors);
  if(c050Q>0) netItems.PC050={label:'Patch Cords 0.50m',qty:c050Q,price:pcp.c050,total:c050Q*pcp.c050};
  if(c300Q>0) netItems.PC300={label:'Patch Cords 3.00m',qty:c300Q,price:pcp.c300,total:c300Q*pcp.c300};
  if(numSrv>=3){const dacQ=numSrv+1;netItems.DAC3={label:'DAC 3m (servidores)',qty:dacQ,price:pcp.DAC3,total:dacQ*pcp.DAC3};}

  groups['Networking']=netItems;
  const swForDC={camSwQ,coreSw48Q,coreSw24Q,totalCoreSw,sfpSwQ,pp48Q};

  // ── Data Centre — Rack, PDU, UPS, HVAC ──────────────────────────────────
  const dc=A.dc;
  const swPowerW=(camSwQ+totalCoreSw)*480+(sfpSwQ?200:0);
  const srvPowerW=numSrv*dc.serverW;
  const totalPowerW=srvPowerW+swPowerW;
  const totalBTU=numSrv*dc.serverBTU;
  const totalSwCount=camSwQ+totalCoreSw+sfpSwQ;
  const totalU=numSrv*dc.serverU+totalSwCount+pp48Q+2;
  // Rack selection
  const rack=dc.racks.find(r=>r.u>=totalU)||dc.racks[dc.racks.length-1];
  // PDU selection
  const pduModel=dc.pdus.find(p=>p.maxW>=totalPowerW)||dc.pdus[dc.pdus.length-1];
  const pduQty=pduModel.id==='PDU8C01'?2:1;
  const dcItems={};
  dcItems.RACK={label:`${rack.label} (${totalU}U utilizados)`,qty:1,price:rack.price,total:rack.price};
  dcItems.PDU={label:`${pduModel.label} (${Math.round(totalPowerW)}W total)`,qty:pduQty,price:pduModel.price,total:pduQty*pduModel.price};
  // UPS — only if hasUPS
  if(eff.hasUPS){
    const upsModel=dc.ups.find(u=>u.maxW>=totalPowerW)||dc.ups[dc.ups.length-1];
    dcItems.UPS={label:upsModel.label,qty:1,price:upsModel.price,total:upsModel.price};
  }
  // HVAC — only if hasHVAC
  if(eff.hasHVAC){
    const hvacModel=dc.hvac.find(h=>h.maxBTU>=totalBTU)||dc.hvac[dc.hvac.length-1];
    dcItems.HVAC={label:`${hvacModel.label} (${Math.round(totalBTU)} BTU/h)`,qty:1,price:hvacModel.price,total:hvacModel.price};
  }
  groups['Data Centre']=dcItems;
  // periféricos — not included in PT mode
  if(!isPT){
    const p=A.peripherals;
    const numGates=eff.doors||0;
    groups['Periféricos']={
      PAR:{label:'Parafusos montagem',qty:modules*p.parafusos.perModule+p.parafusos.extra,price:p.parafusos.price,total:(modules*p.parafusos.perModule+p.parafusos.extra)*p.parafusos.price},
      CAL:{label:'Calhas cablagem',qty:Math.ceil(area*p.calhas.perM2),price:p.calhas.price,total:Math.ceil(area*p.calhas.perM2)*p.calhas.price},
      ABR:{label:'Abraçadeiras',qty:totalCams*p.abracadeiras.perCamera,price:p.abracadeiras.price,total:totalCams*p.abracadeiras.perCamera*p.abracadeiras.price},
      ETQ:{label:'Etiquetas ID',qty:totalCams+totalScales+numSrv,price:p.etiquetas.price,total:(totalCams+totalScales+numSrv)*p.etiquetas.price},
      FON:{label:'Fonte extra',qty:Math.ceil(numSrv/p.fontes.perServers),price:p.fontes.price,total:Math.ceil(numSrv/p.fontes.perServers)*p.fontes.price},
      ...(numGates>0?{
        IOC:{label:'IO Controller (gates)',qty:Math.ceil(numGates*1.1),price:142,total:Math.ceil(numGates*1.1)*142},
        QRC:{label:'QR Code Reader',qty:Math.ceil(numGates*1.1),price:104,total:Math.ceil(numGates*1.1)*104},
      }:{}),
      ARU:{label:'Aruco Cube (calibração)',qty:1,price:491,total:491},
    };
  }
  // Bridges + Data Rails — only for Full Autonomous Store
  if(!isPT){
    if(!groups['Scales']) groups['Scales']={};
    groups['Scales']['BRIDGE']={label:'SENSEI Smart Bridge',qty:bridges,price:66.97,total:Math.round(bridges*66.97)};
    const bridgeAdapters=Math.ceil(bridges*0.086);
    if(bridgeAdapters>0)groups['Scales']['BRIDGE_AD']={label:'F-Bridge Adapter',qty:bridgeAdapters,price:1.32,total:Math.round(bridgeAdapters*1.32*100)/100};
    const drMix=A.dataRailMix[fmt]||A.dataRailMix['Supermercado'];
    const modulesAmb=Math.round(modules*(1-pctRef));
    for(const[ref,pct] of Object.entries(drMix)){
      if(!pct||pct<=0)continue;
      const qty=Math.round(modulesAmb*pct);
      if(qty<=0)continue;
      const price=A.dataRailPrices[ref]||0;
      groups['Scales']['DR_'+ref]={label:A.dataRailLabels[ref]||ref,qty,price,total:qty*price};
    }
  }
  // instalação — custo por sub-tarefa com ownership individual
  const ins=A.installation;
  const sc=A.schedule;
  const rateTable=ins.rates[country]||ins.other;
  const hasExt=!!eff.hasExternalTeam;
  const hpd=sc.hoursPerDay;
  function phaseRate(own){
    if(!hasExt) return rateTable.internal;
    if(own==='internal') return rateTable.internal;
    if(own==='external') return rateTable.external;
    return (rateTable.internal+rateTable.external)/2;
  }
  function ownerLabel(own){return !hasExt?'Int':(own==='internal'?'Int':own==='external'?'Ext':'50/50');}
  // Sub-task costs
  const swCount=camSwQ+totalCoreSw+sfpSwQ;
  const ppCount=pp48Q;
  function subCost(h, own){return {days:h/hpd, rate:Math.round(phaseRate(own)), total:Math.round(h/hpd*phaseRate(own))};}
  const t_c1_server  =subCost(numSrv*sc.c1_server_h,   sc.c1_server_own);
  const t_c1_switch  =subCost(swCount*sc.c1_switch_h,  sc.c1_switch_own);
  const t_c1_patch   =subCost(ppCount*sc.c1_patch_h,   sc.c1_patch_own);
  const t_c2_place   =subCost(totalCams*sc.c2_place_h,  sc.c2_place_own);
  const t_c2_cable   =subCost(totalCams*sc.c2_cable_h,  sc.c2_cable_own);
  const t_c2_angle   =subCost(totalCams*sc.c2_angle_h,  sc.c2_angle_own);
  const t_c2_sample  =subCost(totalCams*sc.c2_sample_h, sc.c2_sample_own);
  const t_c3_install =subCost(totalScales*sc.c3_install_h,sc.c3_install_own);
  const t_c3_diag    =subCost(totalScales*sc.c3_diag_h+sc.c3_diag_base,sc.c3_diag_own);
  const t_c3_repair  =subCost(totalScales*sc.c3_repair_h,sc.c3_repair_own);
  const t_c4_calib   =subCost(totalScales*sc.c4_calib_h,    sc.c4_calib_own);
  const t_c4_planogram=subCost(totalScales*sc.c4_planogram_h,sc.c4_planogram_own);
  const t_c5_base    =subCost(sc.c5_base,            sc.c5_base_own);
  const t_c5_system  =subCost(area*sc.c5_system_h,   sc.c5_system_own);
  groups['Instalação']={
    C1_SRV:{label:`C.1 Servidores [${ownerLabel(sc.c1_server_own)}]`,  qty:Math.ceil(t_c1_server.days),  price:t_c1_server.rate,  total:t_c1_server.total},
    C1_SW: {label:`C.1 Switches [${ownerLabel(sc.c1_switch_own)}]`,   qty:Math.ceil(t_c1_switch.days),  price:t_c1_switch.rate,  total:t_c1_switch.total},
    C1_PP: {label:`C.1 Patch Panels [${ownerLabel(sc.c1_patch_own)}]`, qty:Math.ceil(t_c1_patch.days),   price:t_c1_patch.rate,   total:t_c1_patch.total},
    C2_PLC:{label:`C.2 Câmaras — Colocação [${ownerLabel(sc.c2_place_own)}]`, qty:Math.ceil(t_c2_place.days),  price:t_c2_place.rate,  total:t_c2_place.total},
    C2_CBL:{label:`C.2 Câmaras — Cabos [${ownerLabel(sc.c2_cable_own)}]`,     qty:Math.ceil(t_c2_cable.days),  price:t_c2_cable.rate,  total:t_c2_cable.total},
    C2_ANG:{label:`C.2 Câmaras — Ângulo [${ownerLabel(sc.c2_angle_own)}]`,    qty:Math.ceil(t_c2_angle.days),  price:t_c2_angle.rate,  total:t_c2_angle.total},
    C2_SMP:{label:`C.2 Câmaras — Amostras [${ownerLabel(sc.c2_sample_own)}]`, qty:Math.ceil(t_c2_sample.days), price:t_c2_sample.rate, total:t_c2_sample.total},
    ...(isPT ? {} : {
      C3_INS:{label:`C.3 Scales — Instalação [${ownerLabel(sc.c3_install_own)}]`,qty:Math.ceil(t_c3_install.days),price:t_c3_install.rate,total:t_c3_install.total},
      C3_DIA:{label:`C.3 Scales — Diagnóstico [${ownerLabel(sc.c3_diag_own)}]`,  qty:Math.ceil(t_c3_diag.days),  price:t_c3_diag.rate,  total:t_c3_diag.total},
      C3_REP:{label:`C.3 Scales — Reparação [${ownerLabel(sc.c3_repair_own)}]`,  qty:Math.ceil(t_c3_repair.days),price:t_c3_repair.rate,total:t_c3_repair.total},
      C4_CAL:{label:`C.4 Calibração Gondola [${ownerLabel(sc.c4_calib_own)}]`,   qty:Math.ceil(t_c4_calib.days), price:t_c4_calib.rate, total:t_c4_calib.total},
      C4_PLN:{label:`C.4 Calibração Planograma [${ownerLabel(sc.c4_planogram_own)}]`,qty:Math.ceil(t_c4_planogram.days),price:t_c4_planogram.rate,total:t_c4_planogram.total},
    }),
    C5_BSE:{label:`C.5 Commissioning — Base [${ownerLabel(sc.c5_base_own)}]`,  qty:Math.ceil(t_c5_base.days),   price:t_c5_base.rate,   total:t_c5_base.total},
    C5_SYS:{label:`C.5 Commissioning — Sistema [${ownerLabel(sc.c5_system_own)}]`,qty:Math.ceil(t_c5_system.days),price:t_c5_system.rate,total:t_c5_system.total},
  };

  const total=Object.values(groups).reduce((s,g)=>s+Object.values(g).reduce((a,c)=>a+c.total,0),0);
  return{groups,total,costPerM2:area>0?total/area:0};
}

function effFromSetup(s,fmt,country){
  const isPT_s=(s.projectType||'full')==='tracking';
  const ov=s.overrides||{};
  const av=autoCalc({format:fmt,area:s.area,modules:s.modules,doors:s.doors,addSpare:s.addSpare!==false,useRefurbished:!!s.useRefurbished,projectType:s.projectType||'full',
    _cam21Override:ov.cam21!==undefined?+ov.cam21:undefined,
    _cam28ptOverride:ov.cam28pt!==undefined?+ov.cam28pt:undefined});
  const cam21=ov.cam21!==undefined?+ov.cam21:av.cam21;
  const cam28pt=ov.cam28pt!==undefined?+ov.cam28pt:av.cam28pt;
  const cam28door=ov.cam28door!==undefined?+ov.cam28door:av.cam28door;
  const cam36sm=isPT_s ? 0 : (ov.cam36sm!==undefined?+ov.cam36sm:av.cam36sm);
  const cam36stv=isPT_s ? 0 : (ov.cam36stv!==undefined?+ov.cam36stv:av.cam36stv);
  return{
    format:fmt,area:s.area,modules:s.modules,doors:s.doors,
    pctRef:ov.pctRef!==undefined?+ov.pctRef:s.pctRef,country,
    hasExternalTeam:!!(s.hasExternalTeam),useRefurbished:!!(s.useRefurbished),hasUPS:!!(s.hasUPS),hasHVAC:!!(s.hasHVAC),addSpare:s.addSpare!==false,
    uplink:s.uplink||'Wired Only',netRedundancy:!!(s.netRedundancy),
    cam21,cam28pt,cam28door,cam36sm,cam36stv,
    totalCams:cam21+cam28pt+cam28door+cam36sm+cam36stv,
    totalScales:isPT_s ? 0 : (ov.totalScales!==undefined?+ov.totalScales:av.totalScales),
    numSrv:ov.numSrv!==undefined?+ov.numSrv:av.numSrv,
    srvModel:ov.srvModel||av.srvModel,
    scaleMixOv:ov.scaleMixOv||{},
    scaleDiscount:s.scaleDiscount||0,
    projectType:s.projectType||'full',
  };
}

// ── Navigation ────────────────────────────────────────────────────────────
function go(page){
  S.page=page;
  // Desktop sidebar
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('n-'+page);if(el)el.classList.add('active');
  // Mobile bottom nav
  document.querySelectorAll('.mnav-item').forEach(e=>e.classList.remove('active'));
  const mel=document.getElementById('mn-'+page);if(mel)mel.classList.add('active');
  // Show mobile nav only on small screens
  const mNav=document.getElementById('mobile-nav');
  if(mNav)mNav.style.display=window.innerWidth<=600?'flex':'none';
  rp();
}

function rp(){
  // immediate render for most interactions
  _doRp();
}
let _rpTimer=null;
function rpDebounced(){
  // debounced render for sliders — waits 80ms after last move
  if(_rpTimer)clearTimeout(_rpTimer);
  _rpTimer=setTimeout(()=>{_rpTimer=null;_doRp();},80);
}
function _doRp(){
  const pg=document.getElementById('page'),tt=document.getElementById('page-title'),ta=document.getElementById('topbar-actions'),bc=document.getElementById('topbar-breadcrumb');
  if(!pg)return;
  if(S.page==='dash'){tt.textContent='Dashboard';if(bc)bc.textContent='Overview';ta.innerHTML=`<button class="btn btn-sm" onclick="exportData()" title="Exportar dados para JSON">⬇ Exportar</button><button class="btn btn-sm" onclick="document.getElementById('importInput').click()" title="Importar dados de JSON">⬆ Importar</button><input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(this)">`;pg.innerHTML=bDash();}
  else if(S.page==='projs'){tt.textContent='Projetos';if(bc)bc.textContent='Todos os projetos';ta.innerHTML=`<button class="btn btn-primary btn-sm" onclick="go('new')">+ Novo Setup</button>`;pg.innerHTML=bProjs();}
  else if(S.page==='new'){tt.textContent='Novo Setup';if(bc)bc.textContent='Configurar loja';ta.innerHTML='';pg.innerHTML=bNew();}
  else if(S.page==='stock'){tt.textContent='Stock & Encomendas';if(bc)bc.textContent='Gestão de stock e necessidades';ta.innerHTML='';pg.innerHTML=bStock();}
  else if(S.page==='assump'){tt.textContent='Pressupostos';if(bc)bc.textContent='Configuração global';ta.innerHTML='';pg.innerHTML=bAssump();}
  else if(S.page==='detail'){
    tt.textContent='Detalhe do Setup';
    if(bc)bc.textContent='BOM & Custos';
    ta.innerHTML='<button class="btn btn-ghost btn-sm" onclick="go(\'projs\')">← Voltar</button>'
      +'<button class="btn btn-sm" onclick="(function(){var p=S.curProj,s=p&&p.setups.find(function(x){return x.id===S.curSetup;});if(p&&s)editSetup(p.id,s.id);})()" title="Editar este setup">✏️ Editar</button>'
      +'<button class="btn btn-sm btn-ghost" style="color:var(--red)" onclick="(function(){var p=S.curProj,s=p&&p.setups.find(function(x){return x.id===S.curSetup;});if(p&&s)deleteSetup(p.id,s.id);})()" title="Eliminar este setup">🗑 Eliminar</button>';
    pg.innerHTML=bDetail();
  }
  else if(S.page==='sched'){tt.textContent='Cronograma';if(bc)bc.textContent='Timeline do projeto';ta.innerHTML='';pg.innerHTML=bSched();}
  else if(S.page==='comp'){tt.textContent='Comparar Cenários';if(bc)bc.textContent='Análise comparativa';ta.innerHTML='';pg.innerHTML=bComp();}
  else if(S.page==='sim'){tt.textContent='Simulador';if(bc)bc.textContent='Análise de sensibilidade';ta.innerHTML='';pg.innerHTML=bSim();}
}

// ── FIX: all form mutation functions do NOT call rp() immediately.
// Instead they update state and only re-render when the input loses focus
// or for non-text fields (selects, buttons). Text inputs use onblur.

function setFormField(key,val){
  // update state but do NOT re-render — called from oninput on text fields
  S.form[key]=val;
}

function setFormFieldAndRender(key,val){
  // for selects and numeric inputs where instant feedback is needed
  S.form[key]=val;
  rp();
}

function setBase(key,val){
  S.form[key]=+val;
  // When area changes, auto-recalculate modules unless manually overridden
  if(key==='area'&&S.autoOv.modules===undefined){
    const ratio=A.formatDefaults[S.form.format]?.modulesPerM2||0.25;
    S.form.modules=Math.round(+val*ratio);
  }
  S.autoOv={};
  rp();
}

function setEff(key,val){
  if(val===''||val===null){delete S.autoOv[key];}
  else{S.autoOv[key]=+val;}
  rp();
}

function resetOv(key){delete S.autoOv[key];rp();}

function applyFmt(fmt){
  const d=A.formatDefaults[fmt];
  S.form.format=fmt;
  S.form.area=d.area;
  S.form.modules=Math.round(d.area*(d.modulesPerM2||0.25));
  S.form.doors=d.doors;
  S.form.pctRef=d.pctRef;
  S.autoOv={};
  rp();
}

// ── Auto field component ──────────────────────────────────────────────────
function aField(key,av,label,hint){
  const isOv=S.autoOv[key]!==undefined,val=isOv?S.autoOv[key]:av;
  const badge=isOv?`<span class="bov">manual</span>`:`<span class="ba">auto</span>`;
  const rb=isOv?`<button class="rb" onclick="resetOv('${key}')" title="Repor valor automático">↺</button>`:'';
  // BUG FIX: use onchange (fires on blur/enter) instead of oninput
  // to avoid re-rendering while the user is still typing
  return `<div class="field">
    <div class="field-label">${label} ${badge}</div>
    <div class="field-wrap">
      <input type="number" class="fi ${isOv?'ov-f':'auto-f'}" value="${val}"
        style="padding-right:${isOv?'32px':'10px'}"
        onchange="setEff('${key}',this.value)"/>
      ${rb}
    </div>
    <div class="fhint ${isOv?'ov':''}">${isOv?'Auto seria: '+av:hint}</div>
  </div>`;
}

// ── BOM table ─────────────────────────────────────────────────────────────
function bomHTML(bom, expandState){
  const ex = expandState || {};
  const tog = (key) => `onclick="if(!S._bomExpand)S._bomExpand={};S._bomExpand['${key}']=!S._bomExpand['${key}'];rp()"`;
  const open = (key) => !!ex[key];
  const ch   = (key) => open(key) ? '▾' : '▸';
  const ts   = 'cursor:pointer;user-select:none';

  // ── Level 1: macro group header (yellow) ───────────────────────────────
  function grpHdr(label, total){
    return `<tr class="grp-row"><td colspan="3" style="white-space:normal">${label}</td><td>${fE(total)}</td></tr>`;
  }

  // ── Level 2: collapsible sub-group row (bg2 = light grey) ─────────────
  // showQtyAvg: true → show qty + avg price; false → only total
  function subRow(key, label, qty, avgPrice, total, showQtyAvg=true){
    return `<tr style="background:var(--bg2);${ts}" ${tog(key)}>
      <td style="padding:6px 10px;font-size:11px;font-weight:700;color:var(--text2)">${ch(key)} ${label}</td>
      <td style="color:var(--text2);font-size:12px">${showQtyAvg&&qty>0?fN(qty):''}</td>
      <td style="color:var(--text2);font-size:12px">${showQtyAvg&&avgPrice>0?fE(avgPrice):''}</td>
      <td style="font-weight:600;font-size:12px">${fE(total)}</td>
    </tr>`;
  }

  // ── Level 3: detail rows (bg = lightest grey, indented 22px) ──────────
  function detailRows(arr){
    return arr.map(([,it])=>`<tr style="background:var(--bg)">
      <td style="padding-left:22px;font-size:12px;color:var(--text2)" title="${it.label}">${it.label}</td>
      <td style="color:var(--text3);font-size:12px">${fN(it.qty)}</td>
      <td style="color:var(--text3);font-size:12px">${fE(it.price)}</td>
      <td style="font-weight:600;font-size:12px">${fE(it.total)}</td>
    </tr>`).join('');
  }

  function renderGroup(grp, items){
    const all      = Object.entries(items);
    const grpTotal = all.reduce((a,[,v])=>a+v.total,0);
    const subSum   = arr=>({qty:arr.reduce((a,[,v])=>a+v.qty,0), tot:arr.reduce((a,[,v])=>a+v.total,0)});

    // ── CÂMARAS ────────────────────────────────────────────────────────────
    if(grp==='Câmaras'){
      const {qty,tot}=subSum(all);
      const avg=qty>0?Math.round(tot/qty):0;
      return grpHdr('Câmaras', grpTotal)
        + subRow('cameras','Câmaras',qty,avg,grpTotal,true)
        + (open('cameras')?detailRows(all):'');
    }

    // ── SERVIDORES ─────────────────────────────────────────────────────────
    if(grp==='Servidores'){
      // Single line — always visible, no collapse needed
      return grpHdr('Servidores', grpTotal)
        + all.map(([,it])=>`<tr style="background:var(--bg)">
          <td style="padding-left:22px;font-size:12px;color:var(--text2)">${it.label}</td>
          <td style="color:var(--text3);font-size:12px">${fN(it.qty)}</td>
          <td style="color:var(--text3);font-size:12px">${fE(it.price)}</td>
          <td style="font-weight:600;font-size:12px">${fE(it.total)}</td>
        </tr>`).join('');
    }

    // ── NETWORKING ─────────────────────────────────────────────────────────
    if(grp==='Networking'){
      const isSW = k => /^(ARUBA|SFP|R8N|R9Y|JL6|JL7)/.test(k) || k.includes('_cam') || k.includes('_core');
      const isGW = k => /^(SMicro|RUT)/.test(k);
      const isPP = k => /^PP/.test(k);
      const isPC = k => /^(PC|DAC)/.test(k);

      const subgroups = [
        {key:'net_sw', label:'Switches',     arr:all.filter(([k])=>isSW(k))},
        {key:'net_gw', label:'Gateways',     arr:all.filter(([k])=>isGW(k))},
        {key:'net_pp', label:'Patch Panels', arr:all.filter(([k])=>isPP(k))},
        {key:'net_pc', label:'Patch Cords',  arr:all.filter(([k])=>isPC(k))},
      ];

      let html = grpHdr('Networking', grpTotal);
      for(const {key, label, arr} of subgroups){
        if(!arr.length) continue;
        const {qty,tot}=subSum(arr);
        const avg=qty>0?Math.round(tot/qty):0;
        html += subRow(key, label, qty, avg, tot, true);
        if(open(key)) html += detailRows(arr);
      }
      return html;
    }

    // ── SCALES ─────────────────────────────────────────────────────────────
    if(grp==='Scales'){
      const ambArr   = all.filter(([k])=>k.includes('-AB-'));
      const frioArr  = all.filter(([k])=>k.includes('-WB-'));
      const drArr    = all.filter(([k])=>k.startsWith('DR_'));
      const otherArr = all.filter(([k])=>!k.includes('-AB-')&&!k.includes('-WB-')&&!k.startsWith('DR_'));

      let html = grpHdr('Scales', grpTotal);
      const addSub=(key,label,arr)=>{
        if(!arr.length)return;
        const {qty,tot}=subSum(arr);
        html+=subRow(key,label,qty,qty>0?Math.round(tot/qty):0,tot,true);
        if(open(key))html+=detailRows(arr);
      };
      addSub('scales_amb',  'Scales Ambiente',    ambArr);
      addSub('scales_frio', 'Scales Refrigerado', frioArr);
      addSub('scales_dr',   'Data Rails',         drArr);
      // Other items (Bridges, Adapters) always visible at level 3
      if(otherArr.length) html+=detailRows(otherArr);
      return html;
    }

    // ── DATA CENTRE ────────────────────────────────────────────────────────
    if(grp==='Data Centre'){
      return grpHdr('Data Centre', grpTotal)
        + subRow('dc','Data Centre',0,0,grpTotal,false)
        + (open('dc')?detailRows(all):'');
    }

    // ── PERIFÉRICOS ────────────────────────────────────────────────────────
    if(grp==='Periféricos'){
      return grpHdr('Periféricos', grpTotal)
        + subRow('periph','Periféricos',0,0,grpTotal,false)
        + (open('periph')?detailRows(all):'');
    }

    // ── INSTALAÇÃO ─────────────────────────────────────────────────────────
    if(grp==='Instalação'){
      const {qty,tot}=subSum(all);
      const avg=qty>0?Math.round(tot/qty):0;
      return grpHdr('Instalação', grpTotal)
        + subRow('inst','Instalação',qty,avg,grpTotal,true)
        + (open('inst')?detailRows(all):'');
    }

    // ── fallback ────────────────────────────────────────────────────────────
    return grpHdr(grp, grpTotal) + detailRows(all);
  }

  return `<div class="tbl-wrap"><table class="tbl">
    <colgroup><col style="width:45%"><col style="width:12%"><col style="width:20%"><col style="width:23%"></colgroup>
    <thead><tr><th>Componente</th><th>Qtd.</th><th>Preço unit. / médio</th><th>Total</th></tr></thead>
    <tbody>
    ${Object.entries(bom.groups).map(([grp,items])=>renderGroup(grp,items)).join('')}
    <tr class="tot-row"><td colspan="3">TOTAL</td><td style="color:var(--primary)">${fE(bom.total)}</td></tr>
    </tbody>
  </table></div>`;
}

// ── Pie chart ─────────────────────────────────────────────────────────────
function pieChart(gTots,total,size=110){
  const cx=size/2,cy=size/2,r=size/2-5,hole=size/5;
  let ang=-Math.PI/2;
  const paths=gTots.map(({tot},i)=>{
    const sl=tot/total*2*Math.PI;
    const x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang);
    const x2=cx+r*Math.cos(ang+sl),y2=cy+r*Math.sin(ang+sl);
    const x3=cx+hole*Math.cos(ang+sl),y3=cy+hole*Math.sin(ang+sl);
    const x4=cx+hole*Math.cos(ang),y4=cy+hole*Math.sin(ang);
    const lg=sl>Math.PI?1:0;
    ang+=sl;
    return `<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${x3.toFixed(1)},${y3.toFixed(1)} A${hole},${hole} 0 ${lg},0 ${x4.toFixed(1)},${y4.toFixed(1)} Z" fill="${PC[i%PC.length]}"/>`;
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex-shrink:0" preserveAspectRatio="xMidYMid meet">${paths.join('')}<circle cx="${cx}" cy="${cy}" r="${hole-2}" fill="white"/></svg>`;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────
function bDash(){
  const tots=S.projects.flatMap(p=>p.setups.map(s=>calcBOM(effFromSetup(s,p.format,p.country)).total));
  const avg=tots.length?tots.reduce((a,b)=>a+b,0)/tots.length:0;

  // ── Simulação de custo por área com valores default ────────────────────
  const SIM_AREAS=[20,50,100,200,500,1000,1500];

  // Escolhe a tipologia cuja área default é mais próxima
  const FMT_DEFAULTS={Supermercado:2000,Conveniência:300,POD:20,Corner:100};
  const FMT_COLORS={Supermercado:'#0A0A0A',Conveniência:'#5A5A8A',POD:'#2D6A2D',Corner:'#7A5500'};
  function bestFmt(area){
    // Use log-distance so proportional proximity beats absolute proximity
    // e.g. 1000m² is closer to Supermercado (2000) than Conveniência (300) proportionally
    return Object.entries(FMT_DEFAULTS).reduce((best,[fmt,def])=>{
      return Math.abs(Math.log(def)-Math.log(area))<Math.abs(Math.log(FMT_DEFAULTS[best])-Math.log(area))?fmt:best;
    },Object.keys(FMT_DEFAULTS)[0]);
  }

  // One data point per area
  const simPoints=SIM_AREAS.map(area=>{
    const fmt=bestFmt(area);
    const color=FMT_COLORS[fmt];
    const d=A.formatDefaults[fmt];
    const modules=Math.round(area*(d.modulesPerM2||0.25));
    const av=autoCalc({format:fmt,area,modules,doors:d.doors,addSpare:false,useRefurbished:!!S._dashRefurb});
    const eff={
      format:fmt,area,modules,doors:d.doors,pctRef:d.pctRef,country:'PT',
      cam21:av.cam21,cam28pt:av.cam28pt,cam28door:av.cam28door,
      cam36sm:av.cam36sm,cam36stv:av.cam36stv,
      totalCams:av.totalCams,totalScales:av.totalScales,
      numSrv:av.numSrv,srvModel:av.srvModel,
      hasUPS:false,hasHVAC:false,hasExternalTeam:false,addSpare:false,
      uplink:d.uplink||'Wired Only',netRedundancy:false,useRefurbished:!!S._dashRefurb,
    };
    const bom=calcBOM(eff);
    const hwTotal=bom.total - Object.values(bom.groups['Instalação']||{}).reduce((a,v)=>a+v.total,0);
    return {area,fmt,color,total:hwTotal,perM2:area>0?Math.round(hwTotal/area):0,totalCams:av.totalCams,numSrv:av.numSrv};
  });

  const maxTotal=Math.max(...simPoints.map(p=>p.total));
  const maxPerM2=Math.max(...simPoints.map(p=>p.perM2));

  // ── SVG chart — fixed pixel viewBox, no % positioning ──────────────────
  const D_W=580;          // total viewBox width
  const D_LBL=56;         // area label column width
  const D_BAR=340;        // bar zone width
  const D_VAL=D_LBL+D_BAR+8; // start of value text
  const D_BAR_H=30;
  const D_GAP=10;
  const D_TOP=30;
  const D_H=D_TOP+SIM_AREAS.length*(D_BAR_H+D_GAP)+16;

  function dashBarW(total){ return Math.max(2,(total/maxTotal)*D_BAR); }

  let svgBars='';
  // Grid lines
  [0.25,0.5,0.75].forEach(p=>{
    const x=D_LBL+p*D_BAR;
    svgBars+=`<line x1="${x}" y1="${D_TOP-4}" x2="${x}" y2="${D_H-8}" stroke="rgba(0,0,0,0.06)" stroke-width="1" stroke-dasharray="3,2"/>`;
    svgBars+=`<text x="${x}" y="${D_TOP-8}" text-anchor="middle" font-size="8" fill="#9A9A90" font-family="DM Mono,monospace">${fE(maxTotal*p)}</text>`;
  });
  svgBars+=`<line x1="${D_LBL}" y1="${D_TOP-4}" x2="${D_LBL}" y2="${D_H-8}" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>`;

  simPoints.forEach(({area,fmt,color,total,perM2},i)=>{
    const y=D_TOP+i*(D_BAR_H+D_GAP);
    const bw=dashBarW(total);
    const delay=(i*0.06).toFixed(2);
    // area label
    svgBars+=`<text x="${D_LBL-6}" y="${y+D_BAR_H/2+4}" text-anchor="end" font-size="10" fill="#3A3A35" font-family="DM Mono,monospace" font-weight="600">${area}m²</text>`;
    // bar bg
    svgBars+=`<rect x="${D_LBL}" y="${y}" width="${D_BAR}" height="${D_BAR_H}" rx="4" fill="rgba(0,0,0,0.04)"/>`;
    // bar fill (animated)
    svgBars+=`<rect x="${D_LBL}" y="${y}" width="0" height="${D_BAR_H}" rx="4" fill="${color}">
      <animate attributeName="width" from="0" to="${bw}" dur="0.6s" begin="${delay}s" fill="freeze" calcMode="spline" keySplines="0.25 1 0.5 1"/>
    </rect>`;
    // fmt label inside bar
    svgBars+=`<text x="${D_LBL+8}" y="${y+D_BAR_H/2+4}" font-size="9.5" fill="white" font-family="DM Sans,sans-serif" font-weight="600">${fmt}</text>`;
    // values fixed to right of bar zone — never overlapping
    svgBars+=`<text x="${D_VAL}" y="${y+D_BAR_H/2}" font-size="11" fill="#0A0A0A" font-family="DM Mono,monospace" font-weight="700" dominant-baseline="middle">${fE(total)}</text>`;
    svgBars+=`<text x="${D_VAL}" y="${y+D_BAR_H/2+12}" font-size="8.5" fill="#7A7A70" font-family="DM Mono,monospace" dominant-baseline="middle">${fE(perM2)}/m²</text>`;
  });

  // ── Table view ─────────────────────────────────────────────────────────
  const tableRows=simPoints.map(({area,fmt,color,total,perM2,totalCams,numSrv})=>`
    <tr>
      <td style="font-weight:700;font-family:var(--mono)">${area} m²</td>
      <td><span style="display:inline-flex;align-items:center;gap:5px">
        <span style="width:8px;height:8px;border-radius:2px;background:${color};display:inline-block;flex-shrink:0"></span>
        <span style="font-size:12px">${fmt}</span>
      </span></td>
      <td style="font-weight:700;font-family:var(--mono)">${fE(total)}</td>
      <td style="font-family:var(--mono);color:var(--text2)">${fE(perM2)}</td>
      <td style="font-family:var(--mono);color:var(--text2)">${fN(totalCams)}</td>
      <td style="font-family:var(--mono);color:var(--text2)">${numSrv}</td>
    </tr>`).join('');

  const showTable=S._dashTable;

  return `
  <div class="metric-grid">
    <div class="metric-card"><div class="metric-label">Projetos</div><div class="metric-value">${S.projects.length}</div></div>
    <div class="metric-card"><div class="metric-label">Setups totais</div><div class="metric-value">${S.projects.reduce((a,p)=>a+p.setups.length,0)}</div></div>
    <div class="metric-card"><div class="metric-label">Custo médio</div><div class="metric-value">${fE(avg)}</div><div class="metric-sub">por setup</div></div>
    <div class="metric-card"><div class="metric-label">Formatos activos</div><div class="metric-value">${[...new Set(S.projects.map(p=>p.format))].length}</div></div>
  </div>

  <!-- ── Simulation chart ── -->
  <div class="card" style="margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <div class="sec" style="margin:0">Simulação de custo por tipologia e área</div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px;font-family:var(--mono)">Apenas hardware · sem instalação/deployment · sem spare · sem UPS/HVAC · equipa interna</div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm ${!S._dashRefurb?'btn-primary':''}" onclick="S._dashRefurb=false;rp()">Novo</button>
        <button class="btn btn-sm ${S._dashRefurb?'btn-primary':''}" onclick="S._dashRefurb=true;rp()">Recondicionado</button>
        <div style="width:1px;background:var(--border2);margin:0 2px"></div>
        <button class="btn btn-sm ${!showTable?'btn-primary':''}" onclick="S._dashTable=false;rp()">Gráfico</button>
        <button class="btn btn-sm ${showTable?'btn-primary':''}" onclick="S._dashTable=true;rp()">Tabela</button>
      </div>
    </div>

    ${!showTable?`
    <!-- BAR CHART -->
    <div style="overflow-x:auto">
      <svg width="100%" viewBox="0 0 ${D_W} ${D_H}" style="display:block;min-width:400px" preserveAspectRatio="xMidYMid meet">
        ${svgBars}
      </svg>
    </div>
    <!-- Legend -->
    <div style="display:flex;gap:18px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
      ${Object.entries(FMT_COLORS).map(([fmt,color])=>`
        <div style="display:flex;align-items:center;gap:6px">
          <div style="width:10px;height:10px;border-radius:2px;background:${color};flex-shrink:0"></div>
          <span style="font-size:11px;font-weight:600;color:var(--text2);font-family:var(--mono)">${fmt} (default ${FMT_DEFAULTS[fmt]}m²)</span>
        </div>`).join('')}
    </div>`:`
    <!-- TABLE VIEW -->
    <div class="tbl-wrap">
      <table class="tbl" style="table-layout:auto">
        <thead><tr>
          <th>Área</th>
          <th>Tipologia</th>
          <th>Custo total</th>
          <th>€ / m²</th>
          <th>Câmaras</th>
          <th>Servidores</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>`}
  </div>

  <!-- ── Bottom row ── -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="card">
      <div class="sec" style="margin-top:0">Projetos recentes</div>
      ${S.projects.length===0?`<div class="empty" style="padding:28px">Sem projetos ainda.<br><span style="font-size:12px">Cria o primeiro setup →</span></div>`:
      S.projects.slice(-5).reverse().map(p=>{
        const s=p.setups[p.setups.length-1];if(!s)return '';
        const bom=calcBOM(effFromSetup(s,p.format,p.country));
        return `<div class="prow" onclick="S.curProj=S.projects.find(x=>x.id===${p.id});go('projs')">
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name} <span class="badge badge-blue">${p.format}</span></div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono)">${p.client} · ${p.setups.length} setup(s) · ${fD(s.savedAt)}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-weight:700;font-size:14px;font-family:var(--mono)">${fE(bom.total)}</div>
            <div style="font-size:10px;color:var(--text3);font-family:var(--mono)">${fE(bom.costPerM2)}/m²</div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="card">
      <div class="sec" style="margin-top:0">Custo médio por formato (setups guardados)</div>
      ${FMTS.map(fmt=>{

        const ts=ps.flatMap(p=>p.setups.map(s=>calcBOM(effFromSetup(s,p.format,p.country)).total));
        const avgF=ts.reduce((a,b)=>a+b,0)/ts.length;
        return `<div class="prow" style="cursor:default">
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:13px">${fmt}</div>
            <div style="font-size:11px;color:var(--text3);font-family:var(--mono)">${ps.length} proj. · ${ts.length} setups</div>
          </div>
          <div style="text-align:right">
            <div style="font-weight:700;font-size:14px;font-family:var(--mono)">${fE(avgF)}</div>
            <div style="height:3px;border-radius:2px;background:var(--bg3);margin-top:5px;width:80px">
              <div style="height:100%;border-radius:2px;background:#F0F078;width:${Math.min(100,avgF/50000*100).toFixed(0)}%"></div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

        </div>

      <table class="tbl" style="table-layout:fixed">
        <colgroup><col style="width:24%"><col style="width:10%"><col style="width:10%"><col style="width:13%"><col style="width:13%"><col style="width:12%"><col style="width:10%"><col style="width:8%"></colgroup>
        <thead><tr><th>Nome</th><th>Área</th><th>Overrides</th><th>Custo total</th><th>€/m²</th><th>Criado</th><th>Responsável</th><th></th></tr></thead>
        <tbody>
        ${p.setups.map(s=>{
          const bom=calcBOM(effFromSetup(s,p.format,p.country));
          const novs=Object.keys(s.overrides||{}).length;
          return `<tr style="cursor:pointer" onclick="S.curSetup=${s.id};S.curProj=S.projects.find(x=>x.id===${p.id});go('detail')">
            <td title="${s.name}"><span style="font-weight:600">${s.name}</span>${s.isBaseline?' <span class="badge badge-blue" style="font-size:9px">baseline</span>':''}</td>
            <td style="color:var(--text2)">${s.area} m²</td>
            <td>${novs?`<span class="badge badge-amber">${novs} manual</span>`:'<span class="badge badge-gray">auto</span>'}</td>
            <td style="font-weight:700;color:var(--primary)">${fE(bom.total)}</td>
            <td style="color:var(--text2)">${fE(bom.costPerM2)}</td>
            <td style="color:var(--text3);font-size:11px">${fD(s.savedAt)}</td>
            <td style="color:var(--text2);font-size:11px">${s.assignedTo||'—'}</td>
            <td onclick="event.stopPropagation()" style="text-align:center;white-space:nowrap">
              <button class="btn btn-sm btn-ghost" title="Editar setup"
                onclick="event.stopPropagation();editSetup(${p.id},${s.id})">✏️</button>
              <button class="btn btn-sm btn-ghost" title="Eliminar setup" style="color:var(--red)"
                onclick="event.stopPropagation();deleteSetup(${p.id},${s.id})">🗑</button>
            </td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>
      </div>
    </div>`;
  }
  return `<div class="card">
    ${S.projects.length===0?`<div class="empty"><div style="font-size:32px;margin-bottom:12px;opacity:0.3">📁</div><div style="font-size:15px;font-weight:600;margin-bottom:4px">Sem projetos</div><div style="font-size:13px">Cria o primeiro setup para começar</div></div>`:
    S.projects.map(p=>{
      const s=p.setups[p.setups.length-1];
      const bom=s?calcBOM(effFromSetup(s,p.format,p.country)):null;
      return `<div class="prow" onclick="S.curProj=S.projects.find(x=>x.id===${p.id});rp()">
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name} <span class="badge badge-blue">${p.format}</span></div>
          <div style="font-size:12px;color:var(--text3);margin-top:3px">${p.client} · ${p.setups.length} setup(s) · ${p.country}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-weight:700;font-size:14px;color:var(--primary)">${bom?fE(bom.total):'-'}</div>
          <div style="font-size:11px;color:var(--text3)">${bom?fE(bom.costPerM2)+'/m²':''}</div>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function buildSec(key, ico, title, chips, content){
  const open=S._secOpen&&S._secOpen[key];
  const chipsHtml=chips?'<div class="coll-sub">'+chips+'</div>':'';
  const bodyHtml=open?'<div class="coll-body">'+content+'</div>':'';
  const oc="S._secOpen=S._secOpen||{};S._secOpen['"+key+"']=!S._secOpen['"+key+"'];rp()";
  return '<div class="coll-card">'
    +'<div class="coll-hdr" onclick="'+oc+'">'
    +'<div class="coll-hdr-l">'
    +'<div class="coll-ico">'+ico+'</div>'
    +'<div class="coll-info"><div class="coll-ttl">'+title+'</div>'+chipsHtml+'</div>'
    +'</div>'
    +'<span class="coll-arr'+(open?' open':'')+'">▼</span>'
    +'</div>'
    +bodyHtml
    +'</div>';
}

      ${aField('cam28door',av.cam28door,'2.8mm Door Camera',f.doors+' portas × 1 × (1+spare)')}

            <button class="btn btn-sm ${(f.frioMode||'pct')==='abs'?'btn-primary':''}" style="border:none;border-radius:0;padding:2px 8px;border-left:1px solid var(--border2)"

        ${(f.frioMode||'pct')==='pct'?`

          <span style="font-size:13px;font-weight:700;color:${(f.scaleDiscount||0)>0?'var(--green)':'var(--text3)'};width:40px;flex-shrink:0">${f.scaleDiscount||0}%</span>
        </div>
        <div class="fhint">${(f.scaleDiscount||0)>0?`Redução de ${f.scaleDiscount}% aplicada ao custo total das scales`:'Sem desconto de scales'}</div>
      </div>
    </div>
    <div class="sep"></div>

    <!-- ── Mix de scales editável ──────────────────────────────────────── -->
    ${(()=>{
      const scaleMixOv = S.autoOv.scaleMixOv||{};
      const hasScaleOv = Object.keys(scaleMixOv).length>0;
      const baseMix = A.scaleMix[f.format]||A.scaleMix['Supermercado'];
      const allRefs = Object.keys(A.scaleLabels);
      const ambRefs = allRefs.filter(r=>r.includes('-AB-'));
      const frioRefs= allRefs.filter(r=>r.includes('-WB-'));
      const pctRef  = S.autoOv.pctRef!==undefined?+S.autoOv.pctRef:+f.pctRef;
      const totalSc = S.autoOv.totalScales!==undefined?+S.autoOv.totalScales:av.totalScales;
      const ambSum  = ambRefs.reduce((a,r)=>a+(baseMix[r]||0),0);
      const frioSum = frioRefs.reduce((a,r)=>a+(baseMix[r]||0),0);
      const scFrio  = Math.round(totalSc*pctRef);
      const scAmb   = totalSc-scFrio;

      const autoQty = ref => {
        const isAmb = ref.includes('-AB-');
        const sum = isAmb?ambSum:frioSum;
        const pool= isAmb?scAmb:scFrio;
        return sum>0?Math.round((baseMix[ref]||0)/sum*pool):0;
      };

      // Only show refs that have non-zero auto qty OR manual override
      const visAmb  = ambRefs.filter(r=>autoQty(r)>0||(scaleMixOv[r]!==undefined));
      const visFrio = frioRefs.filter(r=>autoQty(r)>0||(scaleMixOv[r]!==undefined));

      const refRow = (ref) => {
        const isOv = scaleMixOv[ref]!==undefined;
        const val  = isOv?scaleMixOv[ref]:autoQty(ref);
        const auto = autoQty(ref);
        return `<tr style="cursor:default">
          <td style="font-size:12px;color:var(--text2)">${A.scaleLabels[ref]||ref}</td>
          <td>
            <div style="position:relative;display:flex;align-items:center">
              <input type="number" min="0"
                class="fi ${isOv?'ov-f':'auto-f'}" style="font-size:13px;padding:5px 10px;padding-right:${isOv?'32px':'10px'}"
                value="${val}"
                onchange="(function(v){
                  if(!S.autoOv.scaleMixOv)S.autoOv.scaleMixOv={};
                  if(v==='')delete S.autoOv.scaleMixOv['${ref}'];
                  else S.autoOv.scaleMixOv['${ref}']=Math.round(+v);
                  rp();
                })(this.value)"/>
              ${isOv?`<button class="rb" onclick="delete S.autoOv.scaleMixOv['${ref}'];rp()" title="Repor auto (${auto})">↺</button>`:''}
            </div>
          </td>
          <td style="font-size:12px;font-family:var(--mono);color:var(--text3);text-align:right">${fE(A.scalePrices[ref]||0)}</td>
          <td style="font-size:11px;color:var(--text3);font-family:var(--mono)">${isOv?`<span class="bov">manual</span> auto: ${auto}`:`<span class="ba">auto</span>`}</td>
          <td style="font-size:12px;font-weight:600;font-family:var(--mono)">${fE((val||0)*(A.scalePrices[ref]||0))}</td>
        </tr>`;
      };

      // Totals
      const totalAmb  = visAmb.reduce((a,r)=>{const v=scaleMixOv[r]!==undefined?scaleMixOv[r]:autoQty(r);return a+(+v||0);},0);
