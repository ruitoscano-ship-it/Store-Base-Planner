function saveSetup(asNew){
  const f=S.form;
  if(!f.projectName.trim()){alert('Por favor introduz o nome do projeto.');return;}
  const now=new Date().toISOString();
  const newS={id:Date.now(),name:f.setupName||'Cenário Base',assignedTo:f.assignedTo||'',area:+f.area,modules:+f.modules,doors:+f.doors,pctRef:+f.pctRef,frioMode:f.frioMode||'pct',frioTotal:+f.frioTotal||0,scaleDiscount:+f.scaleDiscount||0,projectType:f.projectType||'full',hasExternalTeam:!!f.hasExternalTeam,useRefurbished:!!f.useRefurbished,hasUPS:!!f.hasUPS,hasHVAC:!!f.hasHVAC,addSpare:f.addSpare!==false,uplink:f.uplink||'Wired Only',netRedundancy:!!f.netRedundancy,overrides:{...S.autoOv,scaleMixOv:{...S.autoOv.scaleMixOv}},savedAt:now,updatedAt:now,isBaseline:false,goLive:S.form._schedGoLive||'',numPeople:S.form._schedPeople||2};
  const pid=+f._pid; // coerce to number
  const sid=+f._editSid; // coerce to number
  if(pid){
    const proj=S.projects.find(p=>+p.id===pid);
    if(proj){
      if(!asNew && sid){
        // Update existing setup in place
        const idx=proj.setups.findIndex(s=>+s.id===sid);
        if(idx>=0){
          newS.id=sid;
          newS.savedAt=proj.setups[idx].savedAt;
          proj.setups[idx]=newS;
        } else {
          proj.setups.push(newS);
        }
      } else {
        proj.setups.push(newS);
      }
      S.curProj=proj;
    }
  }else{
    const np={id:Date.now(),name:f.projectName.trim(),client:f.client||'-',format:f.format,country:f.country,setups:[{...newS,isBaseline:true}]};
    S.projects.push(np);S.curProj=np;
  }
  S.form={format:'Supermercado',area:2000,modules:500,doors:2,pctRef:0.30,frioMode:'pct',frioTotal:0,scaleDiscount:0,projectType:'full',assignedTo:'',country:'PT',hasExternalTeam:false,useRefurbished:false,hasUPS:false,hasHVAC:false,addSpare:false,uplink:'Wired + 5G',netRedundancy:false,projectName:'',client:'',setupName:'Cenário Base',_pid:null,_editSid:null,_schedGoLive:'',_schedPeople:2};
  S.autoOv={};
  go('projs');
}

function exportData(){
  const data={
    version:3, exportedAt:new Date().toISOString(), projects:S.projects,
    assumptions:{
      servers:{models:A.servers.models,ratios:A.servers.ratios,smallThreshold:A.servers.smallThreshold,spares:A.servers.spares},

      scalePrices:A.scalePrices, scaleMix:A.scaleMix, scalesSpare:A.scalesSpare,
    },
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='sensei_calc_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();

function importData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.version||!data.projects){alert('Ficheiro inválido.');return;}
      if(!confirm(`Importar ${data.projects.length} projeto(s) de ${data.exportedAt?.slice(0,10)||'?'}?\nAtenção: substitui os projetos actuais.`))return;
      S.projects=data.projects;
      if(data.assumptions){
        if(data.assumptions.servers)Object.assign(A.servers,data.assumptions.servers);
        if(data.assumptions.networking)Object.assign(A.networking,data.assumptions.networking);
        if(data.assumptions.scalePrices)A.scalePrices=data.assumptions.scalePrices;
        if(data.assumptions.scaleMix)A.scaleMix=data.assumptions.scaleMix;
        if(data.assumptions.scalesSpare!==undefined)A.scalesSpare=data.assumptions.scalesSpare;
      }
      rp(); alert('✓ '+data.projects.length+' projeto(s) importados.');
    }catch(err){alert('Erro: '+err.message);}
  };
  reader.readAsText(file);
  input.value='';
}

function deleteProject(projId){
  const proj=S.projects.find(p=>+p.id===+projId);
  if(!proj) return;
  if(!confirm('Eliminar o projeto "'+proj.name+'" e todos os seus '+proj.setups.length+' setup(s)?\n\nEsta acção não pode ser desfeita.')) return;
  S.projects=S.projects.filter(p=>+p.id!==+projId);
  if(S.curProj&&+S.curProj.id===+projId) S.curProj=null;
  rp();
}

function deleteSetup(projId, setupId){
  const proj=S.projects.find(p=>+p.id===+projId);
  const setup=proj?.setups.find(s=>+s.id===+setupId);
  if(!proj||!setup) return;
  if(!confirm('Eliminar o setup "'+setup.name+'"?\n\nEsta acção não pode ser desfeita.')) return;
  proj.setups=proj.setups.filter(s=>+s.id!==+setupId);
  if(proj.setups.length===0 && confirm('O projeto "'+proj.name+'" ficou sem setups. Eliminar também o projeto?')){
    S.projects=S.projects.filter(p=>+p.id!==+projId);

  }
  if(S.page==='detail') go('projs');
  else rp();
}

function addShelf(){
  const id='SH-'+Date.now();
  A.shelves.push({id,label:'Nova Prateleira',active:true,price:100,pct:{Supermercado:0,Conveniência:0,POD:0,Corner:0}});
  rp();
}

function removeShelf(id){
  A.shelves=A.shelves.filter(s=>s.id!==id);
  rp();
}

function updateShelfField(id,field,val){
  const sh=A.shelves.find(s=>s.id===id);
  if(!sh)return;
  if(field==='label')sh.label=val;
  else if(field==='price')sh.price=+val;
  else if(field==='active')sh.active=val;
  // pct fields handled separately
}

function updateShelfPct(id,fmt,val){
  const sh=A.shelves.find(s=>s.id===id);
  if(sh)sh.pct[fmt]=+val;
}

// ── SCHEDULE ENGINE ───────────────────────────────────────────────────────────
function isWE(d){return d.getDay()===0||d.getDay()===6;}

function subWDays(date,days){
  const d=new Date(date.getTime());
  let r=Math.max(0,Math.round(days));
  while(r>0){d.setDate(d.getDate()-1);if(!isWE(d))r--;}
  d.setHours(9,0,0,0);return d;
}

function addWDays(date,days){
  const d=new Date(date.getTime());
  let r=Math.max(0,Math.round(days));
  while(r>0){d.setDate(d.getDate()+1);if(!isWE(d))r--;}
  d.setHours(18,0,0,0);return d;
}

function fmtDate(d){
  if(!d)return '—';
  return d.toLocaleDateString('pt-PT',{day:'2-digit',month:'short',year:'numeric'});
}

function buildSchedData(eff,goLiveStr,numPeople){
  const sc=A.schedule;
  const np=Math.max(1,numPeople||2);
  const hpd=sc.hoursPerDay||8;
  // Horas por fase
  const swCount=0; // simplified — switch count not available here
  const h_c1=(eff.numSrv||1)*sc.c1_server_h + 5*sc.c1_switch_h + 2*sc.c1_patch_h;
  const h_c2=eff.totalCams*(sc.c2_place_h+sc.c2_cable_h+sc.c2_angle_h+sc.c2_sample_h);
  const h_c2_samp=eff.totalCams*sc.c2_sample_h;
  const h_c3=eff.totalScales*(sc.c3_install_h+sc.c3_diag_h+sc.c3_repair_h)+sc.c3_diag_base;
  const h_c4=eff.totalScales*(sc.c4_calib_h+sc.c4_planogram_h);
  const h_c5=sc.c5_base+(eff.area||0)*sc.c5_system_h;
  // Calendar days (working) per phase divided by team
  const cal=h=>Math.ceil(h/hpd/np);
  const c1_cal=cal(h_c1),c2_cal=cal(h_c2),c3_cal=cal(h_c3),c4_cal=cal(h_c4),c5_cal=cal(h_c5);
  const totalCPhours=h_c1+h_c2+h_c3+h_c4+h_c5;
  const goLive=new Date(goLiveStr+'T18:00:00');
  // Build backwards from Go Live
  const phE=goLive;
  const phD_start=subWDays(phE,sc.durD);
  // C5 ends at phD_start, runs backwards
  const c5_end=phD_start;
  const c5_start=subWDays(c5_end,c5_cal);
  // C4 and C3 can run in parallel after C2 samples
  // C4 depends on C2 sample end
  // C3 runs fully in parallel with C2 (after C1)
  // Simplified: C1→C2→(C3||C4)→C5→D
  const c3_end=c5_start;
  const c3_start=subWDays(c3_end,c3_cal);
  const c4_end=c5_start;
  const c4_start=subWDays(c4_end,c4_cal);
  const phC_end=c5_start;
  const c2_end=new Date(Math.min(c3_start.getTime(),c4_start.getTime()));
  const c2_start=subWDays(c2_end,c2_cal);
  const c2_sampleEnd=addWDays(c2_start,Math.ceil(h_c2_samp/hpd/np));
  const c1_end=c2_start;
  const c1_start=subWDays(c1_end,c1_cal);
  const phC_start=c1_start;
  const phB_end=c1_start;
  const sourcing_days=sc.sourcing_min_days+Math.ceil(eff.totalScales*(sc.sourcing_days_per_scale||0.1));
  const phB_start=subWDays(phB_end,sourcing_days);
  const phA_end=phB_start;
  const phA_start=subWDays(phA_end,sc.durA);
  const phD_end=phE;
  return {
    phA_start,phB_start,phB_end,phC_start,phD_start,phD_end,phE,
    totalCPhours,
    c1:{start:c1_start,end:c1_end,hW:h_c1,hCal:c1_cal,label:'C.1 Infra & Servidores'},
    c2:{start:c2_start,end:c2_end,hW:h_c2,hCal:c2_cal,label:'C.2 Câmaras',sampleEnd:c2_sampleEnd},
    c3:{start:c3_start,end:c3_end,hW:h_c3,hCal:c3_cal,label:'C.3 Scales — Instalação'},
    c4:{start:c4_start,end:c4_end,hW:h_c4,hCal:c4_cal,label:'C.4 Calibração'},
    c5:{start:c5_start,end:c5_end,hW:h_c5,hCal:c5_cal,label:'C.5 Commissioning'},
  };
}

function renderGanttSVG(sd){
  const phases=[
    {label:'A — Preparação',start:sd.phA_start,end:sd.phB_start,color:'#94A3B8'},
    {label:'B — Sourcing',start:sd.phB_start,end:sd.phC_start,color:'#64748B'},
    {label:'C.1 Infra',start:sd.c1.start,end:sd.c1.end,color:'#3B82F6'},
    {label:'C.2 Câmaras',start:sd.c2.start,end:sd.c2.end,color:'#8B5CF6'},
    {label:'C.3 Scales',start:sd.c3.start,end:sd.c3.end,color:'#EC4899'},
    {label:'C.4 Calibração',start:sd.c4.start,end:sd.c4.end,color:'#F59E0B'},

  ];
  const minT=sd.phA_start.getTime(), maxT=sd.phE.getTime();
  const span=Math.max(1,maxT-minT);
  const W=700,H=phases.length*28+40,LW=110;
  const toX=t=>LW+(t-minT)/span*(W-LW-10);
  let rows=phases.map((p,i)=>{
    const x1=toX(p.start.getTime()),x2=Math.max(x1+4,toX(p.end.getTime()));
    const y=30+i*28;
    return `<text x="${LW-4}" y="${y+12}" text-anchor="end" font-size="10" fill="#6B7280">${p.label}</text>
      <rect x="${x1}" y="${y}" width="${x2-x1}" height="16" rx="3" fill="${p.color}" opacity="0.85"/>`;
  }).join('');
  // Go Live line
  const glX=toX(sd.phE.getTime());
  rows+=`<line x1="${glX}" y1="20" x2="${glX}" y2="${H-10}" stroke="#F0F078" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="${glX+3}" y="18" font-size="9" fill="#F0F078" font-weight="700">Go Live</text>`;
  return `<div style="overflow-x:auto;margin-top:10px">
    <svg width="${W}" height="${H}" style="font-family:Helvetica Neue,sans-serif;background:var(--bg);border-radius:6px;display:block">
      ${rows}
    </svg></div>`;
}

// ── CRONOGRAMA PAGE ──────────────────────────────────────────────────────────
function bSched(){
  const sc_state=S.sched;
  const projs=S.projects.filter(p=>p.setups&&p.setups.length>0);
  if(!projs.length)return `<div style="padding:32px;text-align:center;color:var(--text3)">Sem projectos com setups guardados.</div>`;
  const selProj=projs.find(p=>p.id===sc_state.selProjId)||projs[0];
  const selSetup=selProj.setups.find(s=>s.id===sc_state.selSetupId)||selProj.setups[0];
  const gl=sc_state.goLive||selSetup.goLive||'';
  const np=sc_state.numPeople||selSetup.numPeople||2;
  return `<div style="max-width:900px">
    <div class="card">
      <div class="sec" style="margin-top:0">Selecção de projecto e setup</div>
      <div class="g3" style="margin-bottom:0">
        <div class="field"><div class="field-label">Projecto</div>
          <div class="field-wrap"><select class="fi" onchange="S.sched.selProjId=+this.value;S.sched.selSetupId=null;rp()">
            ${projs.map(p=>`<option value="${p.id}"${p.id===selProj.id?' selected':''}>${p.name}</option>`).join('')}
          </select></div>
        </div>
        <div class="field"><div class="field-label">Setup</div>
          <div class="field-wrap"><select class="fi" onchange="S.sched.selSetupId=+this.value;rp()">
            ${selProj.setups.map(s=>`<option value="${s.id}"${s.id===selSetup.id?' selected':''}>${s.setupName||s.name}</option>`).join('')}
          </select></div>
        </div>
        <div class="field"><div class="field-label">Pessoas disponíveis</div>
          <div class="field-wrap" style="gap:8px">
            <button class="btn btn-sm" style="width:28px;padding:0;font-size:16px" onclick="S.sched.numPeople=Math.max(1,(S.sched.numPeople||2)-1);rp()">−</button>
            <input type="number" class="fi" style="width:60px;text-align:center;font-weight:700" value="${np}" min="1" max="20"
              onchange="S.sched.numPeople=Math.max(1,+this.value||2);rp()"/>
            <button class="btn btn-sm" style="width:28px;padding:0;font-size:16px" onclick="S.sched.numPeople=Math.min(20,(S.sched.numPeople||2)+1);rp()">+</button>
          </div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="sec" style="margin-top:0">Data de Go Live</div>
      <div class="field" style="max-width:280px">
        <div class="field-wrap">
          <input type="date" class="fi" value="${gl}" onchange="S.sched.goLive=this.value;rp()"/>
        </div>
      </div>
      ${gl?`${(()=>{
        const eff=effFromSetup(selSetup,selProj.format,selProj.country||'PT');
        const sdEff={totalCams:eff.totalCams,totalScales:eff.totalScales,numSrv:eff.numSrv,area:eff.area};
        const sd=buildSchedData(sdEff,gl,np);
        return `<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px">
          <div class="mc"><div class="mc-l">Início Projecto</div><div class="mc-v" style="font-size:12px">${fmtDate(sd.phA_start)}</div></div>
          <div class="mc"><div class="mc-l">Início Impl.</div><div class="mc-v" style="font-size:12px">${fmtDate(sd.phC_start)}</div></div>
          <div class="mc"><div class="mc-l">Horas Fase C</div><div class="mc-v" style="font-size:12px">${sd.totalCPhours.toFixed(0)}h</div></div>
          <div class="mc"><div class="mc-l">Início Testes</div><div class="mc-v" style="font-size:12px">${fmtDate(sd.phD_start)}</div></div>
          <div class="mc" style="background:#F0F078"><div class="mc-l">Go Live</div><div class="mc-v" style="font-size:12px;color:#0A0A0A">${fmtDate(sd.phE)}</div></div>
        </div>
        ${renderGanttSVG(sd)}
        <div class="tbl-wrap" style="margin-top:12px"><table class="tbl"><thead><tr><th>Fase</th><th>Início</th><th>Fim</th><th>Horas totais</th><th>Horas / pessoa</th></tr></thead><tbody>
        ${['c1','c2','c3','c4','c5'].map(k=>{const ph=sd[k];return`<tr><td style="font-weight:600">${ph.label}</td><td>${fmtDate(ph.start)}</td><td>${fmtDate(ph.end)}</td><td style="font-weight:600">${ph.hW.toFixed(1)}h</td><td style="color:var(--text2)">${ph.hCal.toFixed(1)}h ÷${np}</td></tr>`;}).join('')}
        <tr style="background:var(--bg)"><td style="font-weight:700">TOTAL C</td><td>${fmtDate(sd.phC_start)}</td><td>${fmtDate(sd.phD_start)}</td><td style="font-weight:700">${sd.totalCPhours.toFixed(1)}h</td><td style="font-weight:700">${(sd.totalCPhours/np).toFixed(1)}h ÷${np}</td></tr>
        </tbody></table></div>`;
      })()}`:`<div style="padding:18px;text-align:center;color:var(--text3);background:var(--bg);border-radius:var(--radius-sm)">Introduz uma data de Go Live para visualizar o cronograma.</div>`}
    </div>
  </div>`;
}

// ── COMPARADOR ───────────────────────────────────────────────────────────────
function compSetEdit(sid,key,val){
  if(!S.comp.edits[sid])S.comp.edits[sid]={};
  S.comp.edits[sid][key]=val;
  rp();
}

function bComp(){
  const projs=S.projects.filter(p=>p.setups&&p.setups.length>=2);
  const projId=S.comp.projId;
  const selProj=projs.find(p=>p.id===projId)||projs[0]||null;

  // ── Project + setup selector ────────────────────────────────────────────
  const projSelector=`<div class="card">
    <div class="sec" style="margin-top:0">Comparar Cenários</div>
    ${projs.length===0
      ? `<div class="ibox">Ainda não há projectos com 2 ou mais setups guardados. Cria e guarda setups na secção <strong>Projectos</strong>.</div>`
      : `<div class="g2" style="margin-bottom:0">
          <div class="field"><div class="field-label">Projecto</div>
            <div class="field-wrap"><select class="fi" onchange="S.comp.projId=+this.value;S.comp.setupIds=[];S.comp.edits={};rp()">
              ${projs.map(p=>`<option value="${p.id}"${selProj&&p.id===selProj.id?' selected':''}>${p.name}</option>`).join('')}
            </select></div>
          </div>
          ${selProj?`<div class="field"><div class="field-label">Setups a comparar (máx. 4)</div>
            <div class="field-wrap" style="flex-wrap:wrap;gap:8px">
              ${selProj.setups.map(s=>{
                const ids=S.comp.setupIds.length?S.comp.setupIds:selProj.setups.slice(0,4).map(x=>x.id);
                const checked=ids.includes(s.id);
                return `<label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer">
                  <input type="checkbox" ${checked?'checked':''} style="accent-color:var(--accent)"
                    onchange="(function(c){
                      var ids=S.comp.setupIds.length?[...S.comp.setupIds]:${JSON.stringify(selProj.setups.slice(0,4).map(x=>x.id))};
                      if(c&&ids.length<4&&!ids.includes(${s.id}))ids.push(${s.id});
                      else if(!c)ids=ids.filter(x=>x!==${s.id});
                      S.comp.setupIds=ids;S.comp.edits={};rp();
                    })(this.checked)"/>
                  ${s.setupName||s.name}</label>`;
              }).join('')}
            </div>
          </div>`:''}
        </div>`}
  </div>`;

  if(!selProj||!selProj.setups||selProj.setups.length<2)
    return `<div style="max-width:1100px">${projSelector}</div>`;

  const setupIds=S.comp.setupIds.length?S.comp.setupIds:selProj.setups.slice(0,4).map(s=>s.id);
  const setups=selProj.setups.filter(s=>setupIds.includes(s.id));

  if(setups.length<2)
    return `<div style="max-width:1100px">${projSelector}
      <div class="card"><div class="ibox">Selecciona pelo menos 2 setups para comparar.</div></div></div>`;

  const PC=['#3B82F6','#10B981','#F59E0B','#EF4444'];
  const N=setups.length;

  // ── Build effective values + BOMs ───────────────────────────────────────
  const boms=setups.map(s=>{
    const ed=S.comp.edits[s.id]||{};
    const area    = +(ed.area    ??s.area);
    const modules = +(ed.modules ??s.modules);
    const doors   = +(ed.doors   ??s.doors);
    const pctRef  = +(ed.pctRef  ??s.pctRef);
    const addSpare= (ed.addSpare ??s.addSpare)!==false;
    const hasExternalTeam=!!(ed.hasExternalTeam??s.hasExternalTeam);
    const hasUPS  =!!(ed.hasUPS  ??s.hasUPS);
    const hasHVAC =!!(ed.hasHVAC ??s.hasHVAC);
    const uplink  = ed.uplink??s.uplink??'Wired Only';
    const avC=autoCalc({format:selProj.format,area,modules,doors,addSpare});
    const ov={...s.overrides,...(ed.overrides||{})};
    const cam21   =ov.cam21   !==undefined?+ov.cam21   :avC.cam21;
    const cam28pt =ov.cam28pt !==undefined?+ov.cam28pt :avC.cam28pt;
    const cam28door=ov.cam28door!==undefined?+ov.cam28door:avC.cam28door;
    const cam36sm =ov.cam36sm !==undefined?+ov.cam36sm :avC.cam36sm;
    const cam36stv=ov.cam36stv!==undefined?+ov.cam36stv:avC.cam36stv;
    const totalScales=ov.totalScales!==undefined?+ov.totalScales:avC.totalScales;
    const numSrv  =ov.numSrv  !==undefined?+ov.numSrv  :avC.numSrv;
    const srvModel=ov.srvModel||avC.srvModel;
    const totalCams=cam21+cam28pt+cam28door+cam36sm+cam36stv;
    const effC={format:selProj.format,area,modules,doors,pctRef,
      country:selProj.country||'PT',
      cam21,cam28pt,cam28door,cam36sm,cam36stv,totalCams,totalScales,numSrv,srvModel,
      hasUPS,hasHVAC,hasExternalTeam,addSpare,uplink,
      netRedundancy:!!(ed.netRedundancy??s.netRedundancy),
    };
    return {s,bom:calcBOM(effC),eff:effC,ed,area,modules,numSrv,addSpare,hasExternalTeam,hasUPS,hasHVAC,uplink};
  });

  // ── Derived stats ───────────────────────────────────────────────────────
  const totals=boms.map(b=>b.bom.total);
  const maxTotal=Math.max(...totals);
  const minTotal=Math.min(...totals);
  const grpNames=['Câmaras','Scales','Servidores','Networking','Data Centre','Periféricos','Instalação'];
  const grpTotals=boms.map(({bom})=>grpNames.map(g=>
    Object.values(bom.groups[g]||{}).reduce((a,c)=>a+c.total,0)));

  // ── Helper: editable cell for a parameter ───────────────────────────────
  const editNum=(sid,key,val,step,min,style='')=>
    `<input type="number" step="${step}" min="${min}" value="${val}"
      style="width:100%;border:none;background:transparent;font-size:13px;font-weight:600;
             color:var(--text);text-align:center;padding:2px 0;outline:none;${style}"
      onchange="if(!S.comp.edits[${sid}])S.comp.edits[${sid}]={};S.comp.edits[${sid}]['${key}']=+this.value;rp()"/>`;

  const toggleBtn=(sid,key,val,labelOn,labelOff)=>
    `<button onclick="if(!S.comp.edits[${sid}])S.comp.edits[${sid}]={};S.comp.edits[${sid}]['${key}']=!${val};rp()"
      style="width:100%;padding:4px 8px;border-radius:4px;border:1px solid ${val?'var(--accent)':'var(--border2)'};
             background:${val?'#F0F078':'var(--bg)'};color:${val?'#0A0A0A':'var(--text3)'};
             font-size:11px;font-weight:700;cursor:pointer">${val?labelOn:labelOff}</button>`;

  // ── Grid layout: label col + one col per setup ──────────────────────────
  const gridCols=`grid-template-columns:160px repeat(${N},1fr)`;
  const hdrCell=(txt,i)=>`<div style="text-align:center;padding:8px 4px;font-weight:700;font-size:13px;color:${PC[i]};border-bottom:2px solid ${PC[i]}">${txt}</div>`;
  const lblCell=(txt,sub='')=>`<div style="padding:8px 4px 8px 0;font-size:12px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border)">${txt}${sub?`<div style="font-size:10px;font-weight:400;color:var(--text3)">${sub}</div>`:''}</div>`;
  const valCell=(content,color='')=>`<div style="padding:6px 4px;text-align:center;border-bottom:1px solid var(--border);${color?'color:'+color:''}">${content}</div>`;
  const secHdr=(txt)=>`<div style="grid-column:1/-1;padding:8px 0 4px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;border-top:2px solid var(--border2);margin-top:4px">${txt}</div>`;

  // ── Bar component (relative to max) ─────────────────────────────────────
  const bar=(val,max,color)=>{
    const pct=max>0?Math.round(val/max*100):0;
    return `<div style="height:4px;background:var(--border);border-radius:2px;margin-top:3px">
      <div style="height:4px;border-radius:2px;background:${color};width:${pct}%"></div></div>`;
  };

  // ── Reset button ─────────────────────────────────────────────────────────
  const resetBtn=(sid)=>{
    const hasEdits=S.comp.edits[sid]&&Object.keys(S.comp.edits[sid]).length>0;
    return hasEdits?`<button onclick="delete S.comp.edits[${sid}];rp()"
      style="font-size:10px;color:var(--amber);background:none;border:none;cursor:pointer;padding:0">↺ repor</button>`:'';
  };

  return `<div style="max-width:1100px">
    ${projSelector}

    <!-- ── Header cards ── -->
    <div style="display:grid;${gridCols};gap:8px;margin-bottom:12px">
      <div></div>
      ${boms.map(({s,bom,eff},i)=>`
        <div style="background:var(--bg);border-radius:var(--radius-sm);padding:12px;border-top:3px solid ${PC[i]};text-align:center">
          <div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.setupName||s.name}</div>
          <div style="font-size:26px;font-weight:700;color:${PC[i]}">${fE(bom.total)}</div>
          ${bar(bom.total,maxTotal,PC[i])}
          <div style="font-size:10px;color:var(--text3);margin-top:4px">${fE(bom.costPerM2)}/m² · ${fN(eff.totalCams)} câm</div>
          ${bom.total===minTotal&&N>1?`<div style="font-size:10px;font-weight:700;color:#10B981;margin-top:4px">▼ mais barato</div>`:''}
          ${bom.total===maxTotal&&N>1?`<div style="font-size:10px;font-weight:700;color:#EF4444;margin-top:4px">▲ mais caro</div>`:''}
        </div>`).join('')}
    </div>

    <div class="card" style="padding:16px 20px">

      <!-- ── Parâmetros editáveis ── -->
      <div style="display:grid;${gridCols};gap:4px;align-items:center">
        ${secHdr('Parâmetros — edita directamente e o custo actualiza')}

        ${lblCell('Área (m²)')}
        ${boms.map(({s,area},i)=>valCell(editNum(s.id,'area',area,10,10))).join('')}

        ${lblCell('Módulos prateleira','auto ou manual')}
        ${boms.map(({s,modules},i)=>valCell(editNum(s.id,'modules',modules,1,0))).join('')}

        ${lblCell('Nº servidores','override manual')}
        ${boms.map(({s,numSrv,bom},i)=>valCell(
          `<div style="display:flex;flex-direction:column;align-items:center;gap:2px">
            ${editNum(s.id,'numSrv',numSrv,1,1)}
            ${resetBtn(s.id)}
          </div>`
        )).join('')}

        ${lblCell('Servidor spare')}
        ${boms.map(({s,addSpare},i)=>valCell(toggleBtn(s.id,'addSpare',addSpare,'Sim','Não'))).join('')}

        ${lblCell('Equipa externa')}
        ${boms.map(({s,hasExternalTeam},i)=>valCell(toggleBtn(s.id,'hasExternalTeam',hasExternalTeam,'Sim','Não'))).join('')}

        ${lblCell('UPS')}
        ${boms.map(({s,hasUPS},i)=>valCell(toggleBtn(s.id,'hasUPS',hasUPS,'Sim','Não'))).join('')}

        ${lblCell('HVAC')}
        ${boms.map(({s,hasHVAC},i)=>valCell(toggleBtn(s.id,'hasHVAC',hasHVAC,'Sim','Não'))).join('')}
      </div>

      <!-- ── Métricas calculadas ── -->
      <div style="display:grid;${gridCols};gap:4px;align-items:center;margin-top:4px">
        ${secHdr('Métricas calculadas')}

        ${lblCell('Total câmaras')}
        ${boms.map(({eff},i)=>valCell(`<span style="font-size:13px;font-weight:600">${fN(eff.totalCams)}</span>`)).join('')}

        ${lblCell('Total scales')}
        ${boms.map(({eff},i)=>valCell(`<span style="font-size:13px;font-weight:600">${fN(eff.totalScales)}</span>`)).join('')}

        ${lblCell('Servidores finais')}
        ${boms.map(({eff},i)=>valCell(`<span style="font-size:13px;font-weight:600">${eff.numSrv}</span>`)).join('')}

        ${lblCell('Custo / câmara')}
        ${boms.map(({bom,eff},i)=>valCell(`<span style="font-size:12px;font-weight:600">${eff.totalCams>0?fE(Math.round(bom.total/eff.totalCams)):'-'}</span>`)).join('')}

        ${lblCell('Custo / m²')}
        ${boms.map(({bom},i)=>valCell(`<span style="font-size:12px;font-weight:600">${fE(bom.costPerM2)}</span>`)).join('')}

        ${lblCell('Instalação / total')}
        ${boms.map(({bom},i)=>{
          const instTot=Object.values(bom.groups['Instalação']||{}).reduce((a,c)=>a+c.total,0);
          const pct=bom.total>0?Math.round(instTot/bom.total*100):0;
          return valCell(`<span style="font-size:12px;font-weight:600">${pct}%</span><div style="font-size:10px;color:var(--text3)">${fE(instTot)}</div>`);
        }).join('')}
      </div>

      <!-- ── Breakdown por grupo ── -->
      <div style="display:grid;${gridCols};gap:4px;align-items:center;margin-top:4px">
        ${secHdr('Breakdown por grupo de custo')}

        <!-- Group headers with col colour -->
        <div style="padding:4px 0"></div>
        ${boms.map(({s},i)=>
          `<div style="text-align:center;font-size:10px;font-weight:700;color:${PC[i]};padding:4px 2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.setupName||s.name}</div>`
        ).join('')}

        ${grpNames.map((g,gi)=>{
          const vals=grpTotals.map(gt=>gt[gi]);
          const maxVal=Math.max(...vals);
          return `${lblCell(g)}
          ${boms.map(({bom},i)=>{
            const v=grpTotals[i][gi];
            const isBest=v===Math.min(...vals)&&v>0&&N>1;
            const isWorst=v===maxVal&&maxVal>Math.min(...vals)&&N>1;
            const diff=i>0?v-grpTotals[0][gi]:null;
            return `<div style="padding:6px 4px;text-align:center;border-bottom:1px solid var(--border)">
              <div style="font-size:12px;font-weight:600;color:${isBest?'#10B981':isWorst?'#EF4444':'var(--text)'}">${fE(v)}</div>
              ${bar(v,maxVal,PC[i])}
              ${diff!==null?`<div style="font-size:10px;margin-top:1px;color:${diff>0?'#EF4444':diff<0?'#10B981':'var(--text3)'}">
                ${diff>0?'+':''}${diff!==0?fE(diff):'—'}</div>`:''}
            </div>`;
          }).join('')}`;
        }).join('')}

        <!-- Total row -->
        <div style="padding:8px 4px 4px;font-size:13px;font-weight:700;color:var(--text)">TOTAL</div>
        ${boms.map(({bom},i)=>{
          const diff=i>0?bom.total-boms[0].bom.total:null;
          return `<div style="padding:6px 4px;text-align:center">
            <div style="font-size:14px;font-weight:700;color:${PC[i]}">${fE(bom.total)}</div>
            ${diff!==null?`<div style="font-size:11px;font-weight:700;color:${diff>0?'#EF4444':diff<0?'#10B981':'var(--text3)'}">
              ${diff>0?'+':''}${diff!==0?fE(diff):'igual'}</div>`:''}
          </div>`;
        }).join('')}

        <!-- % breakdown bars -->
        ${secHdr('Composição percentual')}
        <div style="padding:4px 0;font-size:10px;color:var(--text3)">% do total</div>
        ${boms.map(({bom},i)=>{
          const parts=grpNames.map((g,gi)=>({g,v:grpTotals[i][gi]})).filter(x=>x.v>0);
          let left=0;
          const colors=['#3B82F6','#10B981','#F59E0B','#8B5CF6','#06B6D4','#EC4899','#6366F1'];
          return `<div style="padding:6px 4px">
            <div style="height:16px;border-radius:4px;overflow:hidden;display:flex;position:relative">
              ${parts.map((p,j)=>{
                const w=bom.total>0?(p.v/bom.total*100).toFixed(1):0;
                return `<div title="${p.g}: ${fE(p.v)} (${w}%)" style="height:100%;width:${w}%;background:${colors[j%colors.length]};flex-shrink:0"></div>`;
              }).join('')}
            </div>
            <div style="margin-top:4px;font-size:9px;color:var(--text3);display:flex;flex-wrap:wrap;gap:4px">
              ${parts.map((p,j)=>`<span style="display:flex;align-items:center;gap:2px">
                <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${colors[j%colors.length]}"></span>
                ${p.g} ${bom.total>0?Math.round(p.v/bom.total*100):0}%</span>`).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>

    </div>
  </div>`;
}

// ── SIMULADOR ────────────────────────────────────────────────────────────────
function bSim(){
  const sm=S._sim;

  // ── Simulation engine — applies all levers ──────────────────────────────
  function simPoint(area, refurb, levers){
    const {scalePct, camPricePct, srvPct, netPct, camCountPct, gpuPerfPct, cpuPerfPct, gpuCamsPerGPU}=levers;
    const fmt=bestFmtForArea(area);
    const d=A.formatDefaults[fmt];
    // modules
    const modules=Math.round(area*(d.modulesPerM2||0.25));
    // camera count reduction (cam21 + cam28pt only)
    const camFactor=1-camCountPct/100;
    const av0=autoCalc({format:fmt,area,modules,doors:d.doors,addSpare:false,useRefurbished:refurb});
    const cam21_adj  = Math.round(av0.cam21  * camFactor);
    const cam28pt_adj= Math.round(av0.cam28pt* camFactor);
    // GPU perf boost: gpuFactor reduces TOTAL GPU slots needed (all workloads: tracking+shelf+inhand)
    // Option B: models software improvements that benefit all GPU work, not just tracking
    const gpuFactor=1+gpuPerfPct/100;
    const cpuFactor_val=1+cpuPerfPct/100;
    // gpuCamsPerGPU override: if >0, pass as _gpuTrackingOverride to autoCalc
    const avAdj=autoCalc({format:fmt,area,modules,doors:d.doors,addSpare:false,useRefurbished:refurb,
      _cam21Override:cam21_adj, _cam28ptOverride:cam28pt_adj, _gpuFactor:gpuFactor, _cpuFactor:cpuFactor_val,
      _gpuTrackingOverride:gpuCamsPerGPU>0?gpuCamsPerGPU:null});

    const eff={
      format:fmt,area,modules,doors:d.doors,pctRef:d.pctRef,country:'PT',
      cam21:cam21_adj, cam28pt:cam28pt_adj,
      cam28door:av0.cam28door, cam36sm:av0.cam36sm, cam36stv:av0.cam36stv,
      totalCams:cam21_adj+cam28pt_adj+av0.cam28door+av0.cam36sm+av0.cam36stv,
      totalScales:avAdj.totalScales, numSrv:avAdj.numSrv, srvModel:avAdj.srvModel,
      hasUPS:false,hasHVAC:false,hasExternalTeam:false,addSpare:false,
      uplink:d.uplink||'Wired Only',netRedundancy:false,useRefurbished:refurb,
    };
    const bom=calcBOM(eff);

    // Apply price reductions on top of BOM
    const grps=bom.groups;
    const grpTotal=(g,pct)=>Object.values(grps[g]||{}).reduce((a,v)=>a+v.total,0)*(1-pct/100);
    const camTotal   = grpTotal('Câmaras',    camPricePct);
    const scaleTotal = grpTotal('Scales',     scalePct);
    const srvTotal   = grpTotal('Servidores', srvPct);
    const netTotal   = grpTotal('Networking', netPct);
    const dcTotal    = Object.values(grps['Data Centre']  ||{}).reduce((a,v)=>a+v.total,0);
    const periphTotal= Object.values(grps['Periféricos']  ||{}).reduce((a,v)=>a+v.total,0);
    const instTotal  = Object.values(grps['Instalação']   ||{}).reduce((a,v)=>a+v.total,0);
    const total = camTotal+scaleTotal+srvTotal+netTotal+dcTotal+periphTotal; // sem instalação

    return {total, perM2:area>0?Math.round(total/area):0,
      numSrv:avAdj.numSrv, totalCams:eff.totalCams, totalScales:avAdj.totalScales,
      srvModel:avAdj.srvModel, fmt,
      cam21:cam21_adj, cam28pt:cam28pt_adj, cam28door:eff.cam28door,
      cam36sm:eff.cam36sm, cam36stv:eff.cam36stv,
      bottleneck:avAdj._bottleneck, frac_gpu:avAdj._frac_gpu, frac_cpu:avAdj._frac_cpu,
      sc_gpu:avAdj._sc_gpu, sc_cpu:avAdj._sc_cpu, useSmall:avAdj._useSmall,
      sc_gpu_t:avAdj._sc_gpu_t, sc_gpu_si:avAdj._sc_gpu_si,
      sc_cpu_t:avAdj._sc_cpu_t, sc_cpu_s:avAdj._sc_cpu_s, sc_cpu_i:avAdj._sc_cpu_i,
      breakdown:{cameras:camTotal,scales:scaleTotal,servers:srvTotal,networking:netTotal,dc:dcTotal,periph:periphTotal,installation:instTotal}};
  }

  function bestFmtForArea(area){
    const FMT_DEFAULTS={Supermercado:2000,Conveniência:300,POD:20,Corner:100};
    return Object.entries(FMT_DEFAULTS).reduce((best,[fmt,def])=>
      Math.abs(Math.log(def)-Math.log(area))<Math.abs(Math.log(FMT_DEFAULTS[best])-Math.log(area))?fmt:best
    ,Object.keys(FMT_DEFAULTS)[0]);
  }

  const SIM_AREAS=[20,50,100,200,500,1000,1500];
  const FMT_COLORS={Supermercado:'#0A0A0A',Conveniência:'#5A5A8A',POD:'#2D6A2D',Corner:'#7A5500'};

  const baseLevers={scalePct:0,camPricePct:0,srvPct:0,netPct:0,camCountPct:0,gpuPerfPct:0,cpuPerfPct:0,gpuCamsPerGPU:0};
  const adjLevers={scalePct:sm.scales,camPricePct:sm.cameras,srvPct:sm.servers,netPct:sm.networking,camCountPct:sm.camCount,gpuPerfPct:sm.gpuPerf,cpuPerfPct:sm.cpuPerf,gpuCamsPerGPU:sm.gpuCamsPerGPU};

  // Baseline: sempre servidores NOVOS e sem ajustes — referência absoluta
  // Adjusted: com todas as escolhas do utilizador (incl. recondicionado)
  const basePts=SIM_AREAS.map(area=>simPoint(area,false,baseLevers));
  const adjPts =SIM_AREAS.map(area=>simPoint(area,sm.refurb,adjLevers));

  const maxTotal=Math.max(...basePts.map(p=>p.total));
  const maxPerM2=Math.max(...basePts.map(p=>p.perM2));
  const showPerM2=sm.perM2;
  const maxVal=showPerM2?maxPerM2:maxTotal;
  const valFn=p=>showPerM2?p.perM2:p.total;

  // ── SVG Chart — fixed zones: labels | bars | values | badge ─────────────
  const SVG_W=620;
  const LABEL_COL=52;   // left: area label
  const BAR_MAX=280;    // bar zone width — bars NEVER exceed this
  const VAL_X=LABEL_COL+BAR_MAX+8;  // fixed start of value text
  const BADGE_X=VAL_X+90;           // fixed start of delta badge
  const BAR_H=13;
  const BAR_GAP=3;
  const ROW_H=48;
  const CHART_H_SVG=SIM_AREAS.length*ROW_H+42;

  // Scale bars to global max — bars proportional and comparable across stores
  const globalMax=Math.max(...basePts.map(p=>valFn(p)));
  // Cap at BAR_MAX so bars never overflow into the value column
  function barW(val){ return globalMax>0?Math.min(BAR_MAX,Math.round((val/globalMax)*BAR_MAX)):0; }

  let svgBars=`<svg width="100%" viewBox="0 0 ${SVG_W} ${CHART_H_SVG}" style="display:block" preserveAspectRatio="xMidYMid meet">`;

  // Axis grid lines
  [0.25,0.5,0.75,1.0].forEach(p=>{
    const x=LABEL_COL+p*BAR_MAX;
    svgBars+=`<line x1="${x}" y1="18" x2="${x}" y2="${CHART_H_SVG-14}" stroke="rgba(0,0,0,0.06)" stroke-width="1" stroke-dasharray="3,2"/>`;
    svgBars+=`<text x="${x}" y="13" text-anchor="middle" font-size="7.5" fill="#9A9A90" font-family="DM Mono,monospace">${showPerM2?fE(globalMax*p)+'/m²':fE(globalMax*p)}</text>`;
  });
  svgBars+=`<line x1="${LABEL_COL}" y1="18" x2="${LABEL_COL}" y2="${CHART_H_SVG-14}" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>`;
  // Vertical separator between bars and values
  svgBars+=`<line x1="${VAL_X-4}" y1="18" x2="${VAL_X-4}" y2="${CHART_H_SVG-14}" stroke="rgba(0,0,0,0.05)" stroke-width="1"/>`;

  SIM_AREAS.forEach((area,i)=>{
    const base=basePts[i], adj=adjPts[i];
    const rowY=20+i*ROW_H;
    const color=FMT_COLORS[bestFmtForArea(area)];
    const hasChange=sm.refurb||sm.scales>0||sm.cameras>0||sm.servers>0||sm.networking>0||sm.camCount>0||sm.gpuPerf>0||sm.cpuPerf>0||sm.gpuCamsPerGPU>0;
    const baseVal=valFn(base), adjVal=valFn(adj);
    const bw=barW(baseVal);
    const aw=barW(adjVal);
    const delta=baseVal>0?Math.round((adjVal-baseVal)/baseVal*100):0;
    const dColor=delta<0?'#2D6A2D':delta>0?'#B00000':'#9A9A90';
    const dBg=delta<0?'#EAF5EA':delta>0?'#FFF0F0':'#F5F5F0';
    const delay=(i*0.05).toFixed(2);
    // Bottleneck indicator
    const isCPUBottleneck = adj.bottleneck==='CPU';
    const btlkId=`btlk_${i}`;

    if(i>0) svgBars+=`<line x1="0" y1="${rowY-5}" x2="${SVG_W}" y2="${rowY-5}" stroke="rgba(0,0,0,0.04)" stroke-width="1"/>`;

    // Area + format labels (left column)
    svgBars+=`<text x="${LABEL_COL-4}" y="${rowY+BAR_H-1}" text-anchor="end" font-size="10" fill="#3A3A35" font-family="DM Mono,monospace" font-weight="600">${area}m²</text>`;
    svgBars+=`<text x="${LABEL_COL-4}" y="${rowY+BAR_H+BAR_GAP+BAR_H-1}" text-anchor="end" font-size="7.5" fill="#9A9A90" font-family="DM Mono,monospace">${bestFmtForArea(area).substring(0,4)}</text>`;

    // Bottleneck indicator dot — always visible
    const dotColor=isCPUBottleneck?'#D97706':'#3B82F6';
    svgBars+=`<circle cx="${LABEL_COL-4}" cy="${rowY-3}" r="3.5" fill="${dotColor}" opacity="0.9"/>`;

    if(hasChange){
      // Base bar (top, semi-transparent)
      svgBars+=`<rect x="${LABEL_COL}" y="${rowY}" width="${bw}" height="${BAR_H}" rx="3" fill="${color}" opacity="0.22"/>`;
      // Adjusted bar (bottom, solid, animated)
      svgBars+=`<rect x="${LABEL_COL}" y="${rowY+BAR_H+BAR_GAP}" width="0" height="${BAR_H}" rx="3" fill="${color}">
        <animate attributeName="width" from="0" to="${aw}" dur="0.4s" begin="${delay}s" fill="freeze" calcMode="spline" keySplines="0.25 1 0.5 1"/>
      </rect>`;
      // Values in fixed column (never overlapping bars)
      svgBars+=`<text x="${VAL_X}" y="${rowY+BAR_H-2}" font-size="8" fill="#9A9A90" font-family="DM Mono,monospace">${fE(baseVal)}</text>`;
      svgBars+=`<text x="${VAL_X}" y="${rowY+BAR_H+BAR_GAP+BAR_H-2}" font-size="9" fill="#0A0A0A" font-family="DM Mono,monospace" font-weight="700">${fE(adjVal)}</text>`;
      // Delta badge in fixed column
      svgBars+=`<rect x="${BADGE_X}" y="${rowY+3}" width="52" height="${BAR_H+BAR_GAP+BAR_H-6}" rx="4" fill="${dBg}"/>`;
      svgBars+=`<text x="${BADGE_X+26}" y="${rowY+BAR_H+3}" text-anchor="middle" font-size="11" fill="${dColor}" font-family="DM Mono,monospace" font-weight="700">${delta>0?'+':''}${delta}%</text>`;
    } else {
      // No change — single solid bar + value in fixed column
      svgBars+=`<rect x="${LABEL_COL}" y="${rowY+BAR_H/2-BAR_H/2}" width="${bw}" height="${BAR_H}" rx="3" fill="${color}" opacity="0.85"/>`;
      svgBars+=`<text x="${VAL_X}" y="${rowY+BAR_H-2}" font-size="9" fill="#0A0A0A" font-family="DM Mono,monospace" font-weight="700">${fE(baseVal)}</text>`;
      // Neutral badge
      svgBars+=`<rect x="${BADGE_X}" y="${rowY+3}" width="52" height="${BAR_H+BAR_GAP+BAR_H-6}" rx="4" fill="#F5F5F0"/>`;
      svgBars+=`<text x="${BADGE_X+26}" y="${rowY+BAR_H+3}" text-anchor="middle" font-size="11" fill="#9A9A90" font-family="DM Mono,monospace" font-weight="500">0%</text>`;
    }
  });

  const legY = CHART_H_SVG - 4;
  svgBars+=`<rect x="${LABEL_COL}" y="${legY-8}" width="20" height="6" rx="2" fill="#555" opacity="0.22"/>`;
  svgBars+=`<text x="${LABEL_COL+24}" y="${legY-2}" font-size="7.5" fill="#9A9A90" font-family="DM Sans,sans-serif">Novo (base)</text>`;
  svgBars+=`<rect x="${LABEL_COL+90}" y="${legY-8}" width="20" height="6" rx="2" fill="#555"/>`;
  svgBars+=`<text x="${LABEL_COL+114}" y="${legY-2}" font-size="7.5" fill="#9A9A90" font-family="DM Sans,sans-serif">Ajustado</text>`;
  svgBars+=`</svg>`;

  // ── Sliders ────────────────────────────────────────────────────────────
  const slider=(key,label,min,max,unit='%',description='')=>`
    <div style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
        <div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em">${label}</div>
        <div style="font-size:14px;font-weight:700;color:${sm[key]>0?'#2D6A2D':'var(--text3)'};font-family:var(--mono)">${unit==='%'?'-':''}${sm[key]}${unit}</div>
      </div>
      ${description?`<div style="font-size:10px;color:var(--text3);margin-bottom:6px;font-family:var(--mono)">${description}</div>`:''}
      <input type="range" min="${min}" max="${max}" step="1" value="${sm[key]}"
        style="width:100%;accent-color:#0A0A0A;height:4px"
        oninput="S._sim['${key}']=+this.value;rpDebounced()"/>
      <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-top:2px;font-family:var(--mono)">
        <span>${min}${unit}</span><span>${max}${unit}</span>
      </div>
    </div>`;

  // ── Summary delta table ─────────────────────────────────────────────────
  const summaryRows=SIM_AREAS.map((area,i)=>{
    const base=basePts[i], adj=adjPts[i];
    const delta=adj.total-base.total;
    const deltaPct=base.total>0?Math.round(delta/base.total*100):0;
    const color=delta<0?'#2D6A2D':delta>0?'#B00000':'var(--text3)';
    const isCPU=adj.bottleneck==='CPU';
    const isGPU=adj.bottleneck==='GPU';
    return `<tr>
      <td style="font-weight:700;font-family:var(--mono)">${area}m²
        ${isCPU?`<span title="CPU bottleneck — GPU já não é o limite" style="display:inline-flex;align-items:center;gap:2px;background:#FFF7DC;border:1px solid rgba(122,85,0,0.2);border-radius:4px;padding:1px 5px;margin-left:5px;font-size:9px;font-weight:700;color:#D97706;font-family:var(--mono);cursor:default">CPU⚡</span>`:''}
        ${isGPU?`<span title="GPU bottleneck — CPU já não é o limite" style="display:inline-flex;align-items:center;gap:2px;background:#EFF6FF;border:1px solid rgba(59,130,246,0.2);border-radius:4px;padding:1px 5px;margin-left:5px;font-size:9px;font-weight:700;color:#3B82F6;font-family:var(--mono);cursor:default">GPU⚡</span>`:''}
      </td>
      <td style="font-size:10px;color:var(--text3)">${bestFmtForArea(area)}</td>
      <td style="font-family:var(--mono)">${fE(base.total)}</td>
      <td style="font-family:var(--mono)">${fE(base.perM2)}/m²</td>
      <td style="font-family:var(--mono);font-weight:700">${fE(adj.total)}</td>
      <td style="font-family:var(--mono)">${fE(adj.perM2)}/m²</td>
      <td style="font-family:var(--mono);font-weight:700;color:${color}">${delta>0?'+':''}${fE(delta)}</td>
      <td style="font-family:var(--mono);font-weight:700;color:${color}">${deltaPct>0?'+':''}${deltaPct}%</td>
      <td style="font-size:11px;color:var(--text2)">${adj.numSrv}×${adj.fmt.substring(0,3)}</td>
    </tr>`;
  }).join('');

  // total savings
  const totalBase=basePts.reduce((a,p)=>a+p.total,0);
  const totalAdj =adjPts.reduce((a,p) =>a+p.total,0);
  const totalDelta=totalAdj-totalBase;
  const totalDeltaPct=totalBase>0?Math.round(totalDelta/totalBase*100):0;

  return `<div style="max-width:1100px">

  <!-- ── Controls ── -->
  <div style="display:grid;grid-template-columns:minmax(280px,320px) 1fr;gap:20px;align-items:start">
    <div>
      <div class="card" style="position:sticky;top:0">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <div class="sec" style="margin:0">Parâmetros de simulação</div>
          <button class="btn btn-ghost btn-sm" onclick="S._sim={refurb:false,scales:0,cameras:0,servers:0,networking:0,camCount:0,gpuPerf:0,cpuPerf:0,gpuCamsPerGPU:0,simArea:300,targetCpm2:0,table:false,perM2:false};rp()">↺ Reset</button>
        </div>

        <div class="field" style="margin-bottom:20px">
          <div class="field-label">Tipo de servidor</div>
          <div class="field-wrap" style="gap:10px">
            ${['Novo','Recondicionado'].map((l,i)=>`<label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
              <input type="radio" name="simRefurb" value="${i===1}" ${sm.refurb===(i===1)?'checked':''}
                onchange="S._sim.refurb=(this.value==='true');rp()"/>
              ${l}</label>`).join('')}
          </div>
        </div>

        <div class="sep"></div>
        <div class="sec">Redução de custos</div>
        ${slider('scales', 'Prateleiras (scales)', 0, 30, '%', 'Redução no custo unitário de todas as scales')}
        ${slider('cameras', 'Câmaras', 0, 50, '%', 'Redução no preço unitário de todas as câmaras')}
        ${slider('servers', 'Servidores', 0, 40, '%', 'Redução no preço do servidor activo (novo ou recond.)')}
        ${slider('networking', 'Networking', 0, 40, '%', 'Redução no custo de switches, gateways e cabos')}

        <div class="sep"></div>
        <div class="sec">Optimização tecnológica</div>
        ${slider('camCount', 'Redução nº câmaras 2.1+2.8', 0, 40, '%', 'Menos câmaras PT → menos processamento → menos servidores')}
        ${slider('gpuPerf', 'Aumento capacidade GPU', 0, 40, '%', 'Mais câmaras por GPU → menos servidores (limitado por CPU)')}
        ${slider('cpuPerf', 'Aumento capacidade CPU', 0, 40, '%', 'Mais threads por servidor → menos servidores (limitado por GPU)')}

        <div class="sep"></div>
        <div class="sec">Capacidade de processamento por GPU</div>
        ${(()=>{
          const activeModel=A.servers.models.find(m=>!m.isSmall&&m.condition==='new'&&m.activeNew)||A.servers.models.find(m=>m.activeNew||m.activeRefurb);
          const baseline=activeModel?.ratios?.gpuTracking||30;
          const current=sm.gpuCamsPerGPU||baseline;
          return `<div style="margin-bottom:16px">
            <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
              <div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em">Câmaras tracking / GPU</div>
              <div style="font-size:14px;font-weight:700;color:${sm.gpuCamsPerGPU>0&&sm.gpuCamsPerGPU!==baseline?'#2D6A2D':'var(--text3)'};font-family:var(--mono)">${current} cam/GPU</div>
            </div>
            <div style="font-size:10px;color:var(--text3);margin-bottom:6px;font-family:var(--mono)">Baseline do modelo activo (${activeModel?.id||'SRV-11'}): ${baseline} cam/GPU · Aumentar = mais capacidade = menos servidores</div>
            <input type="range" min="10" max="80" step="1" value="${current}"
              style="width:100%;accent-color:#0A0A0A;height:4px"
              oninput="S._sim.gpuCamsPerGPU=+this.value;rpDebounced()"/>
            <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-top:2px;font-family:var(--mono)">
              <span>10 cam/GPU</span>
              <span style="color:#0A0A0A;font-weight:700">baseline ${baseline}</span>
              <span>80 cam/GPU</span>
            </div>
            ${sm.gpuCamsPerGPU>0&&sm.gpuCamsPerGPU!==baseline?`<div style="font-size:10px;color:#2D6A2D;font-family:var(--mono);margin-top:4px">${sm.gpuCamsPerGPU>baseline?'↑':'↓'} ${Math.abs(Math.round((sm.gpuCamsPerGPU-baseline)/baseline*100))}% vs baseline</div>`:''}
          </div>`;
        })()}
      </div>
    </div>

    <!-- ── Results ── -->
    <div>
      <!-- KPI banner -->
      <div style="display:flex;background:var(--bg);border-radius:var(--r-lg);border:1px solid var(--border);overflow:hidden;margin-bottom:16px">
        <div style="flex:1;padding:14px 18px;border-right:1px solid var(--border);min-width:0">
          <div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;font-family:var(--mono);margin-bottom:6px">Redução média · 7 lojas</div>
          <div style="font-size:26px;font-weight:700;font-family:var(--mono);color:${totalDeltaPct<0?'var(--green)':totalDeltaPct>0?'var(--red)':'var(--text)'};line-height:1">${totalDeltaPct>0?'+':''}${totalDeltaPct}%</div>
          <div style="font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:4px">${fE(totalDelta)} total vs base</div>
        </div>
        <div style="flex:1;padding:14px 18px;border-right:1px solid var(--border);min-width:0">
          <div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;font-family:var(--mono);margin-bottom:6px">Ajustes activos</div>
          <div style="font-size:26px;font-weight:700;font-family:var(--mono);color:var(--text);line-height:1">${[sm.scales,sm.cameras,sm.servers,sm.networking,sm.camCount,sm.gpuPerf,sm.cpuPerf,sm.gpuCamsPerGPU>0?1:0].filter(v=>v>0).length}<span style="font-size:13px;color:var(--text3);font-weight:400"> / 6</span></div>
          <div style="font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:4px">parâmetros ajustados</div>
        </div>
        <div style="flex:1;padding:14px 18px;min-width:0">
          <div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;font-family:var(--mono);margin-bottom:6px">Servidor activo</div>

        ${!sm.table?`<div style="overflow-x:auto;padding:4px 0">
          ${svgBars}
        </div>
        <!-- Detalhe unificado por loja: setup + bottleneck — sempre visível -->
        <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
          <div style="display:flex;align-items:center;gap:14px;margin-bottom:8px;flex-wrap:wrap">

            <span style="display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#3B82F6"></span><span style="font-size:10px;color:var(--text3);font-family:var(--mono)">GPU bottleneck</span></span>
            <span style="display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#D97706"></span><span style="font-size:10px;color:var(--text3);font-family:var(--mono)">CPU bottleneck</span></span>
          </div>
          ${adjPts.map((pt,i)=>{
            const area=SIM_AREAS[i];
            const base=basePts[i];
            const detailId=`unified_detail_${i}`;
            const isCPU=pt.bottleneck==='CPU';
            const btlkColor=isCPU?'#D97706':'#3B82F6';
            const btlkBg=isCPU?'#FFF7DC':'#EFF6FF';
            const btlkBorder=isCPU?'rgba(122,85,0,0.18)':'rgba(59,130,246,0.2)';
            const btlkLabel=isCPU?'CPU':'GPU';
            const srvMdl=A.servers.models.find(m=>m.id===pt.srvModel);
            const srvLabel=srvMdl?srvMdl.label.split('(')[0].trim():'—';
            const dCam=pt.breakdown.cameras  -base.breakdown.cameras;
            const dSrv=pt.breakdown.servers  -base.breakdown.servers;
            const dNet=pt.breakdown.networking-base.breakdown.networking;
            const dSc =pt.breakdown.scales   -base.breakdown.scales;
            const dClr=v=>v<0?'#2D6A2D':v>0?'#B00000':'var(--text3)';
            const dStr=v=>v===0?'—':(v>0?'+':'')+fE(v);
            const hasChange=sm.refurb||sm.scales>0||sm.cameras>0||sm.servers>0||sm.networking>0||sm.camCount>0||sm.gpuPerf>0||sm.cpuPerf>0||sm.gpuCamsPerGPU>0;
            const delta=base.total>0?Math.round((pt.total-base.total)/base.total*100):0;

              <button onclick="(function(id){const el=document.getElementById(id);el.style.display=el.style.display==='none'?'block':'none'})(\'${detailId}\')"

                    ${hasChange?`<div style="font-size:9px;font-weight:700;color:${dClr(dSrv)};font-family:var(--mono)">${dStr(dSrv)}</div>`:''}

                    .map(([v,col])=>{const w=pt.total>0?(v/pt.total*100).toFixed(1):0;return w>0?`<div style="width:${w}%;background:${col};height:100%"></div>`:''}).join('')}

        <div class="tbl-wrap">

            <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px">

            </div>
          </div>

          ${targetSection}

          <!-- ── Resumo de custos por categoria ────────────────────────── -->
          <div style="margin-top:12px">

            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:6px">
              ${[['📷 Câmaras','#3B82F6',ptAdj.breakdown.cameras,ptAdj.totalCams+' total'],['⚖️ Scales','#10B981',ptAdj.breakdown.scales,fN(ptAdj.totalScales)+' total'],['🖥️ Servidores','#F59E0B',ptAdj.breakdown.servers,ptAdj.numSrv+'× '+srvLabel],['🌐 Networking','#8B5CF6',ptAdj.breakdown.networking,'switches + GW'],['🗄️ Data Centre','#06B6D4',ptAdj.breakdown.dc,'rack + PDU'],['🔧 Periféricos','#EC4899',ptAdj.breakdown.periph,'instalação excl.']]
                .map(([l,c,v,sub])=>`<div style="background:var(--surface);border-radius:6px;padding:8px 10px;border:1px solid var(--border);border-top:3px solid ${c}">
                  <div style="font-size:9px;font-weight:700;color:var(--text3);font-family:var(--mono);margin-bottom:3px">${l}</div>
                  <div style="font-size:13px;font-weight:700;color:var(--text);font-family:var(--mono)">${fE(v)}</div>
                  <div style="font-size:9px;color:var(--text3);font-family:var(--mono)">${sub}</div>
                </div>`).join('')}
            </div>
          </div>

          <!-- ── Detalhe do cálculo de slots ───────────────────────────── -->
          <div style="margin-top:12px">
            <div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;font-family:var(--mono);margin-bottom:8px">
              Detalhe de slots — ${ptAdj.bottleneck}⚡ bottleneck
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
              <!-- GPU slots -->
              <div style="background:${ptAdj.bottleneck==='GPU'?'#EFF6FF':'var(--bg)'};border-radius:7px;padding:10px 12px;border:1px solid ${ptAdj.bottleneck==='GPU'?'rgba(59,130,246,0.3)':'var(--border)'}">
                <div style="font-size:9px;font-weight:700;color:${ptAdj.bottleneck==='GPU'?'#3B82F6':'var(--text3)'};text-transform:uppercase;letter-spacing:0.08em;font-family:var(--mono);margin-bottom:6px">GPU${ptAdj.bottleneck==='GPU'?' ← BOTTLENECK':''}</div>
                <div style="font-size:10px;font-family:var(--mono);color:var(--text2);line-height:1.8">
                  <div>Tracking: ceil(${ptAdj.cam21+(ptAdj.cam28pt||0)+(ptAdj.cam28door||0)} cams ÷ ${sm.gpuCamsPerGPU>0?sm.gpuCamsPerGPU:((A.servers.models.find(m=>m.id===ptAdj.srvModel)||{}).ratios||{}).gpuTracking||30} ÷ 0.95) = <strong>${ptAdj.sc_gpu_t||'—'}</strong></div>
                  <div>Shelf+Inhand (part.): ceil((S+I) ÷ 2) = <strong>${ptAdj.sc_gpu_si||'—'}</strong></div>
                  <div style="border-top:1px solid var(--border);margin-top:4px;padding-top:4px">Total GPU slots = <strong>${ptAdj.sc_gpu}</strong></div>
                  <div>Frac = ${ptAdj.sc_gpu} ÷ ${(A.servers.models.find(m=>m.id===ptAdj.srvModel)||{}).gpus||5} GPUs = <strong>${ptAdj.frac_gpu.toFixed(3)}</strong> → <strong>${Math.ceil(ptAdj.frac_gpu)} srv</strong></div>
                </div>
              </div>
              <!-- CPU slots -->
              <div style="background:${ptAdj.bottleneck==='CPU'?'#FFF7DC':'var(--bg)'};border-radius:7px;padding:10px 12px;border:1px solid ${ptAdj.bottleneck==='CPU'?'rgba(122,85,0,0.3)':'var(--border)'}">
                <div style="font-size:9px;font-weight:700;color:${ptAdj.bottleneck==='CPU'?'#D97706':'var(--text3)'};text-transform:uppercase;letter-spacing:0.08em;font-family:var(--mono);margin-bottom:6px">CPU${ptAdj.bottleneck==='CPU'?' ← BOTTLENECK':''}</div>
                <div style="font-size:10px;font-family:var(--mono);color:var(--text2);line-height:1.8">
                  <div>Tracking: ceil(${ptAdj.cam21+(ptAdj.cam28pt||0)+(ptAdj.cam28door||0)} ÷ 1.64 ÷ 0.95) = <strong>${ptAdj.sc_cpu_t||'—'}</strong></div>
                  <div>Shelf: ceil(cam_shelf ÷ 2.85 + const) = <strong>${ptAdj.sc_cpu_s||'—'}</strong></div>
                  <div>Inhand: ceil(inhand ÷ 2.85 + const) = <strong>${ptAdj.sc_cpu_i||'—'}</strong></div>
                  <div style="border-top:1px solid var(--border);margin-top:4px;padding-top:4px">Total CPU slots = <strong>${ptAdj.sc_cpu}</strong></div>
                  <div>Frac = ${ptAdj.sc_cpu} ÷ ${(A.servers.models.find(m=>m.id===ptAdj.srvModel)||{}).cpuThreads||96} threads = <strong>${ptAdj.frac_cpu.toFixed(3)}</strong> → <strong>${Math.ceil(ptAdj.frac_cpu)} srv</strong></div>
                </div>
              </div>
            </div>
            <div style="font-size:10px;color:var(--text3);font-family:var(--mono);background:var(--surface);border-radius:5px;padding:7px 10px;border:1px solid var(--border)">
              nSrv = ceil(max(GPU=${ptAdj.frac_gpu.toFixed(3)}, CPU=${ptAdj.frac_cpu.toFixed(3)})) = <strong>${Math.ceil(Math.max(ptAdj.frac_gpu,ptAdj.frac_cpu))}</strong>${Math.ceil(Math.max(ptAdj.frac_gpu,ptAdj.frac_cpu))===2&&!ptAdj.useSmall?' → 3 (clustering)':''} → <strong>${ptAdj.numSrv} servidor(es)</strong>
            </div>
          </div>`;

        })()}
      </div>
    </div>
  </div>
  </div>`;
}

function bStock(){
  const stockTab = S._stockTab||'stock';
  const tabs=[['stock','Stock Actual'],['boms','BOMs de Assembly']];

  if(stockTab==='boms'){
    // ── BOM editor ─────────────────────────────────────────────────────────
    const selBom = S._stockSelBom || Object.keys(ASSEMBLY_BOMS)[0];
    const bom = ASSEMBLY_BOMS[selBom];
    return `<div style="max-width:900px">
      <div class="tab-bar">${tabs.map(([k,l])=>`<div class="tab ${stockTab===k?'on':''}" onclick="S._stockTab='${k}';rp()">${l}</div>`).join('')}</div>
      <div style="display:grid;grid-template-columns:220px 1fr;gap:16px">
        <div class="card" style="padding:12px">
          <div class="sec" style="margin-top:0">Produtos assemblados</div>
          ${Object.entries(ASSEMBLY_BOMS).map(([k,b])=>`
            <div onclick="S._stockSelBom='${k}';S._stockTab='boms';rp()"
              style="padding:7px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:${selBom===k?'700':'400'};
                background:${selBom===k?'#F0F078':'transparent'};color:${selBom===k?'#0A0A0A':'var(--text2)'}">
              ${b.label}
            </div>`).join('')}
        </div>
        <div class="card">
          <div class="sec" style="margin-top:0">${bom.label} — BOM de assembly</div>
          <div class="tbl-wrap"><table class="tbl" style="table-layout:fixed">
            <colgroup><col style="width:30%"><col style="width:40%"><col style="width:20%"><col style="width:10%"></colgroup>
            <thead><tr><th>Ref.</th><th>Descrição</th><th>Qtd. por unidade</th><th></th></tr></thead>
            <tbody>
            ${bom.components.map((c,ci)=>`<tr style="cursor:default">
              <td><input class="fi" style="padding:3px 7px;font-size:12px" value="${c.id}"
                oninput="ASSEMBLY_BOMS['${selBom}'].components[${ci}].id=this.value" onblur="rp()"/></td>
              <td><input class="fi" style="padding:3px 7px;font-size:12px" value="${c.label}"
                oninput="ASSEMBLY_BOMS['${selBom}'].components[${ci}].label=this.value" onblur="rp()"/></td>
              <td><input class="fi" type="number" min="1" style="padding:3px 7px;font-size:12px" value="${c.qty}"
                onchange="ASSEMBLY_BOMS['${selBom}'].components[${ci}].qty=+this.value;rp()"/></td>
              <td><button class="btn btn-ghost btn-sm" style="color:var(--red);padding:2px 5px"
                onclick="ASSEMBLY_BOMS['${selBom}'].components.splice(${ci},1);rp()">✕</button></td>
            </tr>`).join('')}
            </tbody>
          </table></div>
          <button class="btn btn-sm" style="margin-top:10px" onclick="ASSEMBLY_BOMS['${selBom}'].components.push({id:'NEW-COMP',label:'Novo componente',qty:1});rp()">+ Adicionar componente</button>
        </div>
      </div>
    </div>`;
  }

  // ── Stock view ────────────────────────────────────────────────────────────
  // Group components
  const groups = [
    {label:'Câmaras (assembladas)', keys:['CAM-21-TPT','CAM-28-PT','CAM-28-DOOR','CAM-36-SM','CAM-36-STV'], type:'assembled'},
    {label:'Scales (assembladas)',  keys:['SCALE-AB','SCALE-WB'], type:'assembled'},
    {label:'Bridges (assembladas)', keys:['BRIDGE'], type:'assembled'},
    {label:'Data Rails (assembladas)', keys:['DR-700','DR-900','DR-1100','DR-1300','DR-1500','DR-1700','DR-1900'], type:'assembled'},
    {label:'Sub-componentes câmaras', keys:['LENS-21','LENS-28','LENS-36','CAM-BOARD','POE-BOARD','M5-SCREW'], type:'comp'},
    {label:'Sub-componentes scales', keys:['LOADCELL','BOARD-AB','BOARD-WB','M6-SCREW','SCALE-FEET','M8-CABLE','WP-CASE','BOCIN'], type:'comp'},
    {label:'Sub-componentes bridges & data rails', keys:['BRIDGE-BOARD','FUSE','BRIDGE-CASE','M4-SCREW','DR-BOARD'], type:'comp'},
    {label:'Switches', keys:['ARUBA6000-48P','ARUBA6000-24P','SFP-SW-12','SFP-SW-24'], type:'comp'},
    {label:'Gateways & Routers', keys:['RUTX08','RUTX50','RUTM50','RUT241'], type:'comp'},
    {label:'Servidores', keys:['SRV-RTX4000','SRV-A4000','SRV-A4000ADA','SRV-RTX4000-Rec','SRV-A4000-Rec','SRV-A4000ADA-Rec','SRV-S01','SRV-S02'], type:'comp'},
    {label:'Networking misc.', keys:['PP48','PP24','PC025','PC050','PC150','PC300','DAC3','DAC5'], type:'comp'},
    {label:'Data Centre & Periféricos', keys:['RACK','PDU','UPS','HVAC','ARU','IOC','QRC'], type:'comp'},
  ];

  const getLabel = k => {
    const asmBom = ASSEMBLY_BOMS[k];
    if(asmBom) return asmBom.label;
    // Try to find label from all component defs
    for(const b of Object.values(ASSEMBLY_BOMS))
      for(const c of b.components) if(c.id===k) return c.label;
    return k;
  };

  return `<div style="max-width:900px">
    <div class="tab-bar">${tabs.map(([k,l])=>`<div class="tab ${stockTab===k?'on':''}" onclick="S._stockTab='${k}';rp()">${l}</div>`).join('')}</div>
    <div class="ibox" style="margin-bottom:12px">
      📦 Stock dummy para simulação. No futuro será sincronizado com o Odoo.
      <strong style="margin-left:8px">Assemblados</strong> = produto final montado ·
      <strong>Componentes</strong> = peças individuais em armazém.
    </div>
    ${groups.map(grp=>`
    <div class="card" style="margin-bottom:12px">
      <div class="sec" style="margin-top:0">${grp.label}</div>
      <div class="tbl-wrap"><table class="tbl" style="table-layout:fixed">
        <colgroup><col style="width:55%"><col style="width:22%"><col style="width:23%"></colgroup>
        <thead><tr><th>Componente</th><th>Ref.</th><th>Stock (un.)</th></tr></thead>
        <tbody>
        ${grp.keys.map(k=>{
          const stockObj = grp.type==='assembled' ? STOCK.assembled : STOCK.components;
          const val = stockObj[k]||0;
          const label = getLabel(k);
          return `<tr style="cursor:default">
            <td style="font-size:12px">${label}</td>
            <td style="font-size:11px;font-family:var(--mono);color:var(--text3)">${k}</td>
            <td>
              <input type="number" min="0" class="ie" style="width:80px" value="${val}"
                onchange="(function(v){
                  ${grp.type==='assembled'?`STOCK.assembled['${k}']=+v`:`STOCK.components['${k}']=+v`};
                  rp();
                })(this.value)"/>
            </td>
          </tr>`;
        }).join('')}
        </tbody>
      </table></div>
    </div>`).join('')}
  </div>`;
}

// ── STOCK NEEDS — rendered inside bNew BOM section ────────────────────────
function renderStockNeeds(bom){
  const needs = computeStockNeeds(bom);
  if(!needs.length) return '';

  // ── Separate assemblies from direct items ──────────────────────────────
  const assemblies = needs.filter(n=>n.isAssembly);
  const directs    = needs.filter(n=>!n.isAssembly);

  // ── Aggregate sub-components across ALL assembly products ──────────────
  // {compId → {label, totalNeeded, stock, toOrder}}
  const compAgg = {};
  for(const n of assemblies){
    for(const c of n.components){
      if(!compAgg[c.id]) compAgg[c.id]={label:c.label, totalNeeded:0, stock:c.stock};
      compAgg[c.id].totalNeeded += c.needed;
    }
  }
  // Recalc toOrder after aggregation (stock is shared)
  for(const id of Object.keys(compAgg)){
    compAgg[id].toOrder = Math.max(0, compAgg[id].totalNeeded - compAgg[id].stock);
  }

  // ── Assembly product groups ────────────────────────────────────────────
  const asmGroups = [
    {label:'Câmaras',    keys:['CAM-21-TPT','CAM-28-PT','CAM-28-DOOR','CAM-36-SM','CAM-36-STV']},
    {label:'Scales',     keys:['SCALE-AB','SCALE-WB']},  // matched by asmKey
    {label:'Bridges',    keys:['BRIDGE']},
    {label:'Data Rails', keys:['DR-700','DR-900','DR-1100','DR-1300','DR-1500','DR-1700','DR-1900']},
  ];

  // ── Summary badge ──────────────────────────────────────────────────────
  const compToOrder = Object.values(compAgg).filter(c=>c.toOrder>0).length;
  const compOk      = Object.values(compAgg).filter(c=>c.toOrder===0).length;
  const dirToOrder  = directs.filter(n=>n.toOrder>0).length;
  const dirOk       = directs.filter(n=>n.toOrder===0).length;

  const badge=(count,label,color,bg)=>count>0
    ?`<span style="padding:3px 10px;border-radius:100px;background:${bg};color:${color};font-size:10px;font-weight:700;font-family:var(--mono)">${count} ${label}</span>`:'';

  // ── Assembly needs table (grouped by category) ─────────────────────────
  const asmRows = asmGroups.map(grp=>{
    // Find needs matching this group's asmKeys
    const grpNeeds = assemblies.filter(n=>grp.keys.includes(n.asmKey||n.key));
    if(!grpNeeds.length) return '';
    const detailId = `asm_${grp.label.replace(/\s/g,'_')}`;
    const grpTotal = grpNeeds.reduce((a,n)=>a+n.needed,0);
    const grpFromStock = grpNeeds.reduce((a,n)=>a+n.fromAssembled,0);
    const grpAssemble  = grpNeeds.reduce((a,n)=>a+n.canAssemble,0);
    const grpOrder     = grpNeeds.reduce((a,n)=>a+n.toOrder,0);
    const icon = grpOrder>0?'📦':grpAssemble>0?'🔧':'✅';
    const actionColor = grpOrder>0?'var(--red)':grpAssemble>0?'#D97706':'var(--green)';
    const actionBg    = grpOrder>0?'var(--red-light)':grpAssemble>0?'#FFF7DC':'var(--green-light)';

    return `
    <tr style="cursor:pointer" onclick="(function(id){const el=document.getElementById(id);el.style.display=el.style.display==='none'?'block':'none'})('${detailId}')">
      <td style="font-size:12px;font-weight:700">▸ ${grp.label}</td>
      <td style="font-family:var(--mono);font-size:12px;font-weight:700;text-align:center">${fN(grpTotal)}</td>
      <td style="font-family:var(--mono);font-size:12px;text-align:center;color:${grpFromStock>0?'var(--green)':'var(--text3)'}">${fN(grpFromStock)}</td>
      <td style="font-family:var(--mono);font-size:12px;text-align:center;color:${grpAssemble>0?'#D97706':'var(--text3)'}">${fN(grpAssemble)}</td>
      <td style="font-family:var(--mono);font-size:12px;font-weight:700;text-align:center;color:${grpOrder>0?'var(--red)':'var(--text3)'}">${grpOrder>0?fN(grpOrder):'—'}</td>
      <td style="text-align:center"><span style="padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700;font-family:var(--mono);background:${actionBg};color:${actionColor}">${icon}</span></td>
    </tr>
    <tr><td colspan="6" style="padding:0">
      <div id="${detailId}" style="display:none;background:var(--bg);padding:4px 0 4px 16px;border-bottom:1px solid var(--border)">
        <table style="width:100%;font-size:11px;border-collapse:collapse">
          <thead><tr style="background:var(--bg2)">
            <th style="padding:4px 8px;text-align:left;font-size:9px;color:var(--text3);font-family:var(--mono)">Produto</th>
            <th style="padding:4px 6px;text-align:center;font-size:9px;color:var(--text3);font-family:var(--mono)">Neces.</th>
            <th style="padding:4px 6px;text-align:center;font-size:9px;color:var(--text3);font-family:var(--mono)">Stock</th>
            <th style="padding:4px 6px;text-align:center;font-size:9px;color:var(--text3);font-family:var(--mono)">Assembly</th>
            <th style="padding:4px 6px;text-align:center;font-size:9px;color:var(--text3);font-family:var(--mono)">Encomendar</th>
          </tr></thead>
          <tbody>${grpNeeds.map(n=>`<tr style="border-top:1px solid var(--border)">
            <td style="padding:4px 8px;font-size:11px;color:var(--text2)">${n.label}</td>
            <td style="padding:4px 6px;text-align:center;font-family:var(--mono);font-weight:600">${fN(n.needed)}</td>
            <td style="padding:4px 6px;text-align:center;font-family:var(--mono);color:${n.fromAssembled>0?'var(--green)':'var(--text3)'}">${fN(n.fromAssembled)}</td>
            <td style="padding:4px 6px;text-align:center;font-family:var(--mono);color:${n.canAssemble>0?'#D97706':'var(--text3)'}">${fN(n.canAssemble)}</td>
            <td style="padding:4px 6px;text-align:center;font-family:var(--mono);font-weight:700;color:${n.toOrder>0?'var(--red)':'var(--text3)'}">${n.toOrder>0?fN(n.toOrder):'✓'}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
    </td></tr>`;
  }).join('');

  // ── Sub-component aggregated table ─────────────────────────────────────
  // Group by category for readability
  const compCategories = [
    {label:'Câmaras',     ids:['LENS-21','LENS-28','LENS-36','CAM-BOARD','POE-BOARD','M5-SCREW']},
    {label:'Scales',      ids:['LOADCELL','BOARD-AB','BOARD-WB','M6-SCREW','SCALE-FEET','M8-CABLE','WP-CASE','BOCIN']},
    {label:'Bridges & Data Rails', ids:['BRIDGE-BOARD','FUSE','BRIDGE-CASE','M4-SCREW','DR-BOARD']},
  ];

  const compRows = compCategories.map(cat=>{
    const catComps = cat.ids.map(id=>compAgg[id]).filter(Boolean).filter(c=>c.totalNeeded>0);
    if(!catComps.length) return '';
    return `
    <tr class="grp-row"><td colspan="4">${cat.label}</td></tr>
    ${catComps.map(c=>`<tr style="cursor:default">
      <td style="font-size:12px;padding-left:16px">${c.label}</td>
      <td style="font-family:var(--mono);font-size:12px;font-weight:700;text-align:center">${fN(c.totalNeeded)}</td>
      <td style="font-family:var(--mono);font-size:12px;text-align:center;color:${c.stock>=c.totalNeeded?'var(--green)':'var(--text3)'}">${fN(c.stock)}</td>
      <td style="font-family:var(--mono);font-size:12px;font-weight:700;text-align:center;color:${c.toOrder>0?'var(--red)':'var(--green)'}">${c.toOrder>0?fN(c.toOrder):'✓'}</td>
    </tr>`).join('')}`;
  }).join('');

  // ── Direct items table ─────────────────────────────────────────────────
  const directGroups = [
    {label:'Servidores',  filter:n=>n.key.startsWith('SRV-')},
    {label:'Switches',    filter:n=>n.key.includes('ARUBA')||n.key.includes('SFP')},
    {label:'Gateways',    filter:n=>['RUTX08','RUTX50','RUTM50','RUT241','SMicro'].includes(n.key)},
    {label:'Networking misc.', filter:n=>/^(PP|PC|DAC)/.test(n.key)},
    {label:'Data Centre & Periféricos', filter:n=>['RACK','PDU','UPS','HVAC','ARU','IOC','QRC'].some(k=>n.key.includes(k))},
  ];
  const directRows = directGroups.map(grp=>{
    const items = directs.filter(grp.filter);
    if(!items.length) return '';
    return `
    <tr class="grp-row"><td colspan="3">${grp.label}</td></tr>
    ${items.map(n=>`<tr style="cursor:default">
      <td style="font-size:12px;padding-left:16px">${n.label}</td>
      <td style="font-family:var(--mono);font-size:12px;font-weight:700;text-align:center">${fN(n.needed)}</td>
      <td style="font-family:var(--mono);font-size:12px;text-align:center">
        <span style="padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700;font-family:var(--mono);background:${n.toOrder===0?'var(--green-light)':'var(--red-light)'};color:${n.toOrder===0?'var(--green)':'var(--red)'}">
          ${n.toOrder===0?'✅ '+fN(n.fromAssembled)+' em stock':'📦 enc. '+fN(n.toOrder)}
        </span>
      </td>
    </tr>`).join('')}`;
  }).join('');

  return `
  <div class="sec" style="margin-top:0">Necessidades de encomenda & stock</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
    ${badge(compOk+dirOk,'itens em stock','var(--green)','var(--green-light)')}
    ${badge(compToOrder+dirToOrder,'sub-componentes/itens a encomendar','var(--red)','var(--red-light)')}
    ${badge(assemblies.filter(n=>n.action==='assemble').length,'produtos para assemblar','#D97706','#FFF7DC')}
  </div>

  <!-- Assemblados por categoria -->
  ${assemblies.length?`
  <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);margin-bottom:6px">Produtos assemblados</div>
  <div class="tbl-wrap" style="margin-bottom:14px"><table class="tbl" style="table-layout:fixed">
    <colgroup><col style="width:30%"><col style="width:13%"><col style="width:13%"><col style="width:13%"><col style="width:13%"><col style="width:18%"></colgroup>
    <thead><tr>
      <th>Categoria</th>
      <th style="text-align:center">Necessário</th>
      <th style="text-align:center">Em stock</th>
      <th style="text-align:center">Assemblar</th>
      <th style="text-align:center">Encomendar</th>
      <th style="text-align:center">Estado</th>
    </tr></thead>
    <tbody>${asmRows}</tbody>
  </table></div>`:''}

  <!-- Sub-componentes agregados -->
  ${compRows?`
  <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);margin-bottom:6px">Sub-componentes (agregado)</div>
  <div class="tbl-wrap" style="margin-bottom:14px"><table class="tbl" style="table-layout:fixed">
    <colgroup><col style="width:40%"><col style="width:20%"><col style="width:20%"><col style="width:20%"></colgroup>
    <thead><tr>
      <th>Componente</th>
      <th style="text-align:center">Total necessário</th>
      <th style="text-align:center">Stock</th>
      <th style="text-align:center">A encomendar</th>
    </tr></thead>
    <tbody>${compRows}</tbody>
  </table></div>`:''}

  <!-- Directos (sem assembly) -->
  ${directRows?`
  <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);margin-bottom:6px">Componentes directos</div>
  <div class="tbl-wrap"><table class="tbl" style="table-layout:fixed">
    <colgroup><col style="width:50%"><col style="width:20%"><col style="width:30%"></colgroup>
    <thead><tr><th>Componente</th><th style="text-align:center">Necessário</th><th style="text-align:center">Estado</th></tr></thead>
    <tbody>${directRows}</tbody>
  </table></div>`:''}`;
}

window.addEventListener('DOMContentLoaded',()=>{
  // Show/hide mobile nav based on screen size
  function syncMobileNav(){
    const mNav=document.getElementById('mobile-nav');
    if(mNav) mNav.style.display=window.innerWidth<=600?'flex':'none';
  }
  syncMobileNav();
  window.addEventListener('resize',syncMobileNav);
  rp();
});
</script>
